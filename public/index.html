  function togglePPEdit(type, idx) {
    if (ppLockedItems.has(type + '-' + idx)) return;
    const card = document.querySelector('.pp-item-card[data-pp-type="' + type + '"][data-pp-idx="' + idx + '"]');
    if (card) card.classList.toggle('pp-editing');
  }

  function cancelPPEdit(type, idx) {
    const card = document.querySelector('.pp-item-card[data-pp-type="' + type + '"][data-pp-idx="' + idx + '"]');
    if (card) card.classList.remove('pp-editing');
  }

  function savePPEdit(type, idx) {
    const card = document.querySelector('.pp-item-card[data-pp-type="' + type + '"][data-pp-idx="' + idx + '"]');
    if (!card) return;
    const inputs = card.querySelectorAll('.pp-edit-form [data-field]');
    const updates = {};
    inputs.forEach(inp => {
      const field = inp.dataset.field;
      updates[field] = inp.tagName === 'TEXTAREA' ? inp.value : (inp.type === 'number' ? Number(inp.value) : inp.value);
    });

    const d = lastGeneratedData;
    if (type === 'char') {
      const c = d.characters?.characters?.[idx];
      if (!c) return;
      if (updates.name !== undefined) c.name = updates.name;
      const app = c.appearance || {};
      ['age','gender','ethnicity','height','build','skinTone','hairColor','hairStyle','eyeColor','facialHair'].forEach(f => {
        if (updates[f] !== undefined) app[f] = updates[f];
      });
      if (updates.distinctiveFeatures !== undefined) app.distinctiveFeatures = updates.distinctiveFeatures.split(',').map(s => s.trim()).filter(Boolean);
      c.appearance = app;
    } else if (type === 'loc') {
      const l = d.locations?.locations?.[idx];
      if (!l) return;
      ['name','type','description','lightingCondition','mood'].forEach(f => { if (updates[f] !== undefined) l[f] = updates[f]; });
      if (updates.interior !== undefined) l.interior = updates.interior === 'true';
      if (updates.colorScheme !== undefined) l.colorScheme = updates.colorScheme.split(',').map(s => s.trim()).filter(Boolean);
      if (updates.keyFeatures !== undefined) l.keyFeatures = updates.keyFeatures.split(',').map(s => s.trim()).filter(Boolean);
    } else if (type === 'outfit') {
      const wp = preProductionData?.wardrobePlan?.wardrobeEntries || [];
      const entry = wp[idx];
      if (!entry) return;
      if (updates.outfitName !== undefined) entry.outfitName = updates.outfitName;
      if (updates.outfitDescription !== undefined) entry.outfitDescription = updates.outfitDescription;
    } else if (type === 'audio-theme') {
      const themes = preProductionData?.audioDesign?.globalThemes || [];
      const theme = themes[idx];
      if (!theme) return;
      ['name','mood','description','tempo','genre','generationPrompt'].forEach(f => { if (updates[f] !== undefined) theme[f] = updates[f]; });
      if (updates.instruments !== undefined) theme.instruments = updates.instruments.split(',').map(s => s.trim()).filter(Boolean);
    } else if (type === 'audio-scene') {
      const sa = preProductionData?.audioDesign?.sceneAudio || [];
      const entry = sa.find(s => s.sceneIndex === idx);
      if (!entry) return;
      ['musicTheme','musicPrompt','musicMood','musicAction'].forEach(f => { if (updates[f] !== undefined) entry[f] = updates[f]; });
    }
    renderPreProduction();
  }

  function ppAiRegen(type, idx) {
    if (ppLockedItems.has(type + '-' + idx)) {
      alert('Unlock this item first to use AI.');
      return;
    }
    const direction = prompt('Creative direction for AI regeneration (optional):');
    if (direction === null) return; // cancelled
    if (type === 'char') {
      const c = lastGeneratedData?.characters?.characters?.[idx];
      if (c) regenerateAsset('character-ref', c.name, { name: c.name, appearance: c.appearance, direction });
    } else if (type === 'loc') {
      const l = lastGeneratedData?.locations?.locations?.[idx];
      if (l) regenerateAsset('background', l.name, { name: l.name, type: l.type, description: l.description, direction });
    } else if (type === 'outfit') {
      const wp = preProductionData?.wardrobePlan?.wardrobeEntries || [];
      const entry = wp[idx];
      if (entry) regenerateAsset('outfit', entry.characterName + '-s' + entry.sceneIndex, { character: entry.characterName, outfitName: entry.outfitName, direction });
    } else if (type === 'audio-theme') {
      const theme = preProductionData?.audioDesign?.globalThemes?.[idx];
      if (theme) regenerateAsset('audio-theme', theme.name, { ...theme, direction });
    } else if (type === 'audio-scene') {
      const scene = lastGeneratedData?.scenes?.[idx];
      if (scene) regenerateAsset('audio-scene', 'scene-' + idx, { sceneTitle: scene.title, direction });
    }
  }

  // Reference image upload for characters and locations
  function triggerPPUpload(type, idx) {
    if (ppLockedItems.has(type + '-' + idx)) { alert('Unlock this item first.'); return; }
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        const base64 = dataUrl.split(',')[1];
        const mimeType = file.type || 'image/png';
        if (type === 'char') {
          const c = lastGeneratedData?.characters?.characters?.[idx];
          if (c) {
            c.uploadedReference = { base64, mimeType };
            renderPreProduction();
          }
        } else if (type === 'loc') {
          const l = lastGeneratedData?.locations?.locations?.[idx];
          if (l) {
            l.uploadedReference = { base64, mimeType };
            renderPreProduction();
          }
        }
      };
      reader.readAsDataURL(file);
    };
    input.click();
  }

  function clearPPUpload(type, idx) {
    if (type === 'char') {
      const c = lastGeneratedData?.characters?.characters?.[idx];
      if (c) { delete c.uploadedReference; renderPreProduction(); }
    } else if (type === 'loc') {
      const l = lastGeneratedData?.locations?.locations?.[idx];
      if (l) { delete l.uploadedReference; renderPreProduction(); }
    }
  }

  // Fetch with a timeout — resolves to null on timeout/error instead of throwing
  async function fetchWithTimeout(url, options, timeoutMs = 90000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(timer);
      return res;
    } catch (e) {
      clearTimeout(timer);
      console.warn(`Fetch ${url} failed/timed out:`, e.message);
      return null;
    }
  }

  async function approveAndBuildTimeline() {
    if (!lastGeneratedData) return;
    document.getElementById('resultContent').style.display = 'none';
    document.getElementById('resultAiBar').classList.remove('visible');
    const ppv = document.getElementById('preproductionView');
    ppv.classList.add('visible');

    // Show loading state
    ppv.innerHTML = `<div class="pp-loading"><div class="spinner-lg"></div><div>Generating continuity plan...</div></div>`;

    try {
      // Step 1: Continuity plan (required — wardrobe & audio depend on it)
      const cpRes = await fetchWithTimeout('/api/continuity-plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          characters: lastGeneratedData.characters,
          locations: lastGeneratedData.locations,
          scenes: lastGeneratedData.scenes,
          concept: lastGeneratedData.concept,
          input: getFormInput(),
        }),
      });
      let continuityPlan = { entries: [] };
      if (cpRes && cpRes.ok) {
        continuityPlan = await cpRes.json();
      } else if (cpRes) {
        const err = await cpRes.json().catch(() => ({}));
        console.warn('Continuity plan failed:', err.error);
      }

      // Step 2: Show the UI IMMEDIATELY with characters & locations editable
      // while wardrobe & audio load in the background
      preProductionData = {
        continuityPlan,
        wardrobePlan: { wardrobeEntries: [] },
        audioDesign: { globalThemes: [], sceneAudio: [] },
        assetApprovals: {},
        sceneSignoffs: {},
        composedCharacters: {},
        _wardrobeLoading: true,
        _audioLoading: true,
      };
      lastGeneratedData.preProduction = preProductionData;

      // Render immediately — user can start reviewing characters, locations, scene breakdown
      renderPreProduction();

      // Fetch wardrobe & audio in PARALLEL in the background
      Promise.all([
        fetchWithTimeout('/api/enhance-wardrobe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            characters: lastGeneratedData.characters,
            continuityPlan,
          }),
        }).then(async (wRes) => {
          if (wRes && wRes.ok) {
            preProductionData.wardrobePlan = await wRes.json();
          } else {
            console.warn('Wardrobe enhancement failed or timed out — using defaults');
          }
          preProductionData._wardrobeLoading = false;
          renderPreProduction();
        }).catch(err => {
          console.warn('Wardrobe failed:', err);
          preProductionData._wardrobeLoading = false;
          renderPreProduction();
        }),

        fetchWithTimeout('/api/audio-design', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            concept: lastGeneratedData.concept,
            scenes: lastGeneratedData.scenes,
            continuityPlan,
          }),
        }).then(async (adRes) => {
          if (adRes && adRes.ok) {
            preProductionData.audioDesign = await adRes.json();
          } else {
            console.warn('Audio design failed or timed out — using defaults');
          }
          preProductionData._audioLoading = false;
          renderPreProduction();
        }).catch(err => {
          console.warn('Audio failed:', err);
          preProductionData._audioLoading = false;
          renderPreProduction();
        }),
      ]);
    } catch (err) {
      ppv.innerHTML = `<div class="pp-loading" style="color:var(--red)">${esc(err.message)}<br><button class="pp-back-btn" onclick="goBackToResults()" style="margin-top:1rem">Back to Results</button></div>`;
    }
  }

  // ── Image Generation (Gemini Nano Banana Pro) ──

  function isVoiceOnlyCharacter(c) {
    if (!c) return false;
    const role = (c.role || '').toLowerCase();
    const name = (c.name || '').toLowerCase();
    const app = c.appearance || {};
    const skin = (app.skinTone || '').toLowerCase();
    const hair = (app.hairColor || '').toLowerCase();
    const features = ((app.distinctiveFeatures || []).join(' ')).toLowerCase();
    return role === 'narrator' ||
      name.includes('narrator') || name.includes('voiceover') || name.includes('voice-over') ||
      skin.includes('not visible') || skin.includes('voice only') ||
      hair.includes('not visible') || hair.includes('voice only') ||
      features.includes('never seen') || features.includes('voice only');
  }

  async function generateCharacterImage(charIndex) {
    const chars = lastGeneratedData?.characters?.characters || [];
    const c = chars[charIndex];
    if (!c) return;

    if (isVoiceOnlyCharacter(c)) {
      alert(`"${c.name}" is a voice-only character — no portrait needed.`);
      return;
    }

    const btn = event?.target;
    const portrait = btn?.closest('.char-portrait');
    if (btn) { btn.textContent = 'Generating...'; btn.disabled = true; }

    try {
      const style = lastGeneratedData?.concept?.visualStyleRecommendation || 'cinematic';
      const payload = {
        name: c.name,
        appearance: c.appearance || {},
        defaultOutfit: c.defaultOutfit || {},
        style,
      };
      if (c.uploadedReference) payload.referenceImage = c.uploadedReference;
      const res = await fetch('/api/generate-image/character', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error);

      // Replace placeholder with actual image
      if (portrait) {
        const placeholder = portrait.querySelector('.placeholder-icon');
        if (placeholder) placeholder.remove();
        let img = portrait.querySelector('.gen-portrait-img');
        if (!img) {
          img = document.createElement('img');
          img.className = 'gen-portrait-img';
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:6px;';
          portrait.insertBefore(img, portrait.firstChild);
        }
        img.src = 'data:' + (result.mimeType || 'image/png') + ';base64,' + result.base64;
      }
      // Store in data structure for composition pipeline
      lastGeneratedData.characters.characters[charIndex].generatedPortrait = { base64: result.base64, mimeType: result.mimeType };
      if (btn) { btn.textContent = 'Regenerate'; btn.disabled = false; }
    } catch (err) {
      if (btn) { btn.textContent = 'Generate Reference'; btn.disabled = false; }
      alert('Image generation failed: ' + err.message);
    }
  }

  async function generateLocationImage(locIndex) {
    const locs = lastGeneratedData?.locations?.locations || [];
    const l = locs[locIndex];
    if (!l) return;

    const btn = event?.target;
    const preview = btn?.closest('.loc-preview');
    if (btn) { btn.textContent = 'Generating...'; btn.disabled = true; }

    try {
      const style = lastGeneratedData?.concept?.visualStyleRecommendation || 'cinematic';
      const payload = {
        name: l.name,
        type: l.type,
        description: l.description,
        interior: l.interior,
        lightingCondition: l.lightingCondition,

    if (!character?.generatedPortrait) {
      alert(`Generate a portrait for ${charName} first (Character Sheets tab).`);

    }

    const wp = preProductionData?.wardrobePlan?.wardrobeEntries || [];
    const wardrobeEntry = wp.find(w => w.characterName === charName && w.sceneIndex === sceneIdx);
    const outfitRef = wardrobeEntry?.generatedImage || null;

    const cp = preProductionData?.continuityPlan?.entries || [];
    const sceneEntry = cp.find(e => e.sceneIndex === sceneIdx);
    const scene = (lastGeneratedData?.scenes || [])[sceneIdx];
    const charEntry = sceneEntry?.characters?.find(c => c.name === charName) || {};

    const btn = event?.target;
    if (btn) { btn.textContent = 'Composing...'; btn.disabled = true; }

    try {
      const style = lastGeneratedData?.concept?.visualStyleRecommendation || 'cinematic';
      const res = await fetch('/api/generate-image/compose-character', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          characterName: charName,
          portraitRef: character.generatedPortrait,
          outfitRef,
          accessoryRefs: [],
          sceneContext: {
            title: scene?.title || '',
            locationName: sceneEntry?.locationName || scene?.locationName || '',

            emotionalState: charEntry.emotionalState || '',
            action: charEntry.continuityNotes || '',
          },

        }),

      const result = await res.json();
      if (!res.ok) throw new Error(result.error);

      const key = charName + '-' + sceneIdx;
      preProductionData.composedCharacters[key] = { base64: result.base64, mimeType: result.mimeType };

      // Update thumbnail in the breakdown
      const thumbEl = document.getElementById('compose-thumb-' + key.replace(/\s+/g, '_'));
      if (thumbEl) {
        thumbEl.innerHTML = `<img src="data:${result.mimeType};base64,${result.base64}" style="width:100%;height:100%;object-fit:cover;border-radius:4px;">`;

    } catch (err) {
      if (btn) { btn.textContent = 'Compose'; btn.disabled = false; }
      alert('Character composition failed: ' + err.message);

  async function composeAllCharacters() {
    const scenes = lastGeneratedData?.scenes || [];
    const cp = preProductionData?.continuityPlan?.entries || [];
    const chars = lastGeneratedData?.characters?.characters || [];
    let composed = 0, skipped = 0, total = 0;

    const btn = event?.target;
    if (btn) { btn.textContent = 'Composing...'; btn.disabled = true; }

    for (let si = 0; si < scenes.length; si++) {
      const entry = cp.find(e => e.sceneIndex === si);
      const sceneChars = entry?.characters || scenes[si]?.characters || [];
      for (const ch of sceneChars) {
        total++;
        const character = chars.find(c => c.name === ch.name);
        if (!character?.generatedPortrait) { skipped++; continue; }
        try {
          if (btn) btn.textContent = `Composing ${composed + 1}/${total}...`;
          await composeCharacterForScene(ch.name, si);
          composed++;
        } catch { skipped++; }
      }
    }
    if (btn) { btn.textContent = `Compose All (${composed} done)`; btn.disabled = false; }
    if (skipped > 0) alert(`Composed ${composed} characters. Skipped ${skipped} (missing portrait or outfit reference).`);
  }

  // ── Shot Frame Generation Pipeline ──

  async function generateShotFrames(sceneIdx, shotIdx) {
    const scenes = lastGeneratedData?.scenes || [];
    const shots = lastGeneratedData?.shots || {};
    const sceneShots = shots[sceneIdx]?.shots || shots[String(sceneIdx)]?.shots || [];
    const shot = sceneShots[shotIdx];
    if (!shot) return;

    const scene = scenes[sceneIdx];
    const cp = preProductionData?.continuityPlan?.entries || [];
    const sceneEntry = cp.find(e => e.sceneIndex === sceneIdx);
    const loc = (lastGeneratedData?.locations?.locations || []).find(l => l.name === (sceneEntry?.locationName || scene?.locationName));
    const style = lastGeneratedData?.concept?.visualStyleRecommendation || 'cinematic';

    // Gather character references for this scene
    // Priority: composed character > portrait fallback
    const composedChars = [];
    const sceneChars = sceneEntry?.characters || scene?.characters || [];
    const allChars = lastGeneratedData?.characters?.characters || [];
    for (const ch of sceneChars) {
      const key = ch.name + '-' + sceneIdx;
      const composed = preProductionData?.composedCharacters?.[key];
      if (composed) {
        composedChars.push({ name: ch.name, base64: composed.base64, mimeType: composed.mimeType });
      } else {
        // Fallback: use the character's portrait reference for consistency
        const charData = allChars.find(c => c.name === ch.name);
        if (charData?.generatedPortrait) {
          composedChars.push({ name: ch.name, base64: charData.generatedPortrait.base64, mimeType: charData.generatedPortrait.mimeType });
        }
      }
    }

    const locBg = loc?.generatedBackground || null;

    const btn = event?.target;
    if (btn) { btn.textContent = 'Generating...'; btn.disabled = true; }

    // Generate firstFrame
    const frames = [shot.firstFrame, shot.lastFrame];
    const frameLabels = ['firstFrame', 'lastFrame'];
    let anyError = false;

    try {
      for (let fi = 0; fi < frames.length; fi++) {
        const f = frames[fi];
        if (!f) continue;
        if (btn) btn.textContent = `Generating frame ${fi + 1}/2...`;
        try {
          // Build continuity reference: chain from previous shot's last frame
          const continuityRef = (fi === 0 && shot._chainedFromPrevious) ? shot._chainedFromPrevious : null;

          const res = await fetch('/api/generate-image/shot-frame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              frame: {
                description: f.description || '',
                backgroundDescription: scene?.title || '',
                characters: (f.characters || sceneChars).map(c => ({
                  name: c.name,
                  pose: c.pose || 'natural',
                  expression: c.expression || c.emotionalState || '',
                  position: c.position || 'center',
                  action: c.action || '',
                })),
                cameraAngle: shot.camera?.angle || 'eye level',
                shotSize: shot.camera?.shotSize || shot.shotSize || 'medium',
              },
              references: {
                composedCharacters: composedChars,
                locationBackground: locBg ? { name: loc.name, base64: locBg.base64, mimeType: locBg.mimeType } : null,
                continuityFrame: continuityRef,
              },
              style,
            }),
          });
          const result = await res.json();
          if (!res.ok) throw new Error(result.error);

          // Store the generated frame
          shot[frameLabels[fi]].generatedImage = { base64: result.base64, mimeType: result.mimeType };

          // Update DOM
          const frameEl = document.querySelector(`[data-scene="${sceneIdx}"][data-shot="${shotIdx}"] .timeline-frame.${fi === 0 ? 'first' : 'last'} .frame-img-placeholder`);
          if (frameEl) {
            frameEl.innerHTML = `<img src="data:${result.mimeType};base64,${result.base64}" style="width:100%;height:auto;border-radius:4px;">`;
          }
        } catch (err) {
          anyError = true;
          console.error(`Frame generation failed for ${frameLabels[fi]}:`, err);
        }
      }
    } finally {
      if (btn) { btn.textContent = anyError ? 'Retry Frames' : 'Regenerate Frames'; btn.disabled = false; }
    }
  }

  async function generateAllFrames() {
    const scenes = lastGeneratedData?.scenes || [];
    const shots = lastGeneratedData?.shots || {};
    let generated = 0, total = 0;

    const btn = event?.target;
    if (btn) { btn.disabled = true; }

    // Count total
    for (let i = 0; i < scenes.length; i++) {
      const sceneShots = shots[i]?.shots || shots[String(i)]?.shots || [];
      total += sceneShots.length;
    }

    // Chain frames: previous shot's last frame informs next shot's first frame
    let previousLastFrame = null;
    let previousLocation = null;
    const cp = preProductionData?.continuityPlan?.entries || [];

    for (let i = 0; i < scenes.length; i++) {
      const sceneShots = shots[i]?.shots || shots[String(i)]?.shots || [];
      const scene = scenes[i];
      const sceneEntry = cp.find(e => e.sceneIndex === i);
      const currentLocation = sceneEntry?.locationName || scene?.locationName || '';
      const locationChanged = previousLocation && currentLocation !== previousLocation;

      for (let j = 0; j < sceneShots.length; j++) {
        const shot = sceneShots[j];
        if (btn) btn.textContent = `Generating ${generated + 1}/${total}...`;

        // Chain: ALWAYS pass previous shot's last frame for character continuity
        // Even across location changes, characters should look the same
        if (previousLastFrame && !shot.firstFrame?.generatedImage) {
          shot._chainedFromPrevious = previousLastFrame;
        }

        try {
          await generateShotFrames(i, j);
          generated++;

          // Store last frame for chaining to next shot
          if (shot.lastFrame?.generatedImage) {
            previousLastFrame = shot.lastFrame.generatedImage;
          }
        } catch (err) {
          console.error('Frame generation failed:', err);
        }
      }
      previousLocation = currentLocation;
    }

    if (btn) { btn.textContent = `Generate All Images (${generated}/${total} done)`; btn.disabled = false; }
  }

  // ── Veo 3.1 Video Generation Pipeline ──

  async function generateShotVideo(sceneIdx, shotIdx) {
    const scenes = lastGeneratedData?.scenes || [];
    const shots = lastGeneratedData?.shots || {};
    const sceneShots = shots[sceneIdx]?.shots || shots[String(sceneIdx)]?.shots || [];
    const shot = sceneShots[shotIdx];
    if (!shot) return;

    const scene = scenes[sceneIdx];
    const ff = shot.firstFrame || {};
    const lf = shot.lastFrame || {};

    // Gather reference images (up to 3): composed characters + location
    const referenceImages = [];
    const cp = preProductionData?.continuityPlan?.entries || [];
    const sceneEntry = cp.find(e => e.sceneIndex === sceneIdx);
    const sceneChars = sceneEntry?.characters || scene?.characters || [];

    const allChars = lastGeneratedData?.characters?.characters || [];
    for (const ch of sceneChars) {
      if (referenceImages.length >= 3) break;
      const key = ch.name + '-' + sceneIdx;
      const composed = preProductionData?.composedCharacters?.[key];
      if (composed) {
        referenceImages.push({ base64: composed.base64, mimeType: composed.mimeType });
      } else {
        // Fallback: use portrait reference for character consistency
        const charData = allChars.find(c => c.name === ch.name);
        if (charData?.generatedPortrait) {
          referenceImages.push({ base64: charData.generatedPortrait.base64, mimeType: charData.generatedPortrait.mimeType });
        }
      }
    }

    // Build rich prompt with audio cues for Veo 3.1 native audio
    let audioPrompt = '';
    const ad = preProductionData?.audioDesign?.sceneAudio?.find(s => s.sceneIndex === sceneIdx);
    if (ad) {
      const sfx = (ad.soundEffects || []).map(s => s.description).join(', ');
      if (ad.musicMood) audioPrompt += `Background music mood: ${ad.musicMood}. `;
      if (sfx) audioPrompt += `Sound effects: ${sfx}. `;
    }

    // Character dialogue/action descriptions
    const charActions = (ff.characters || sceneChars).map(c =>
      `${c.name}: ${c.action || c.pose || ''}, expression: ${c.expression || c.emotionalState || ''}`
    ).join('. ');

    const visualStyle = lastGeneratedData?.concept?.visualStyleRecommendation || 'cinematic';
    const prompt = `${shot.camera?.shotSize || 'medium'} shot, camera: ${shot.camera?.angle || 'eye level'}${shot.camera?.movement ? ', ' + shot.camera.movement : ''}.

VISUAL STYLE: ${visualStyle}
ALL visual choices (lighting, color grading, composition, atmosphere) MUST match this style direction.

Scene: ${ff.description || scene.title || ''}
Characters: ${charActions}
${audioPrompt}
${lf.description ? `The shot transitions to: ${lf.description}` : ''}
Render in the "${visualStyle}" visual style throughout. Professional film production quality.`;

    const btn = event?.target;
    const container = btn?.closest('.timeline-shot');
    const statusEl = container?.querySelector('.video-status');
    if (btn) { btn.textContent = 'Starting...'; btn.disabled = true; }
    if (statusEl) statusEl.textContent = 'Starting video generation...';

    try {
      // Start generation
      const startRes = await fetch('/api/generate-video/shot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt,
          firstFrame: ff.generatedImage || null,
          lastFrame: lf.generatedImage || null,
          referenceImages,
          aspectRatio: '16:9',
          resolution: '720p',
        }),
      });
      const startData = await startRes.json();
      if (!startRes.ok) throw new Error(startData.error);

      const jobId = startData.jobId;
      if (statusEl) statusEl.textContent = 'Generating video (this takes 1-6 min)...';

      // Poll for completion
      let done = false;
      while (!done) {
        await new Promise(r => setTimeout(r, 10000)); // poll every 10s
        const statusRes = await fetch(`/api/generate-video/status/${jobId}`);
        const statusData = await statusRes.json();

        if (statusData.status === 'done') {
          done = true;
          // Store video URL on shot
          shot.generatedVideoUrl = statusData.videoUrl;

          // Show video player
          const playerEl = container?.querySelector('.video-player-container');
          if (playerEl) {
            playerEl.innerHTML = `<video controls style="width:100%;border-radius:6px;margin-top:0.5rem;" src="${statusData.videoUrl}"></video>`;
          }
          if (statusEl) statusEl.textContent = 'Video ready!';
          if (btn) { btn.textContent = 'Regenerate Video'; btn.disabled = false; }
          // Update Final Cut playlist when individual video completes
          buildFinalCutPlaylist();
        } else if (statusData.status === 'error') {
          throw new Error(statusData.error);
        } else {
          if (statusEl) statusEl.textContent = `Generating... ${statusData.elapsedSeconds || '?'}s elapsed`;
        }
      }
    } catch (err) {
      if (btn) { btn.textContent = 'Generate Video'; btn.disabled = false; }
      const errMsg = String(err?.message || err);
      if (errMsg.includes('429') || errMsg.includes('RESOURCE_EXHAUSTED') || errMsg.includes('quota')) {
        if (statusEl) statusEl.textContent = 'Quota exceeded — try again later';
        if (statusEl) statusEl.style.color = 'var(--red)';
      } else {
        if (statusEl) statusEl.textContent = 'Failed: ' + err.message;
      }
      console.error('Video generation failed:', err);
    }
  }

  async function generateAllVideos() {
    const scenes = lastGeneratedData?.scenes || [];
    const shots = lastGeneratedData?.shots || {};
    let generated = 0, total = 0;

    const btn = event?.target;
    if (btn) { btn.disabled = true; }

    for (let i = 0; i < scenes.length; i++) {
      const sceneShots = shots[i]?.shots || shots[String(i)]?.shots || [];
      total += sceneShots.length;
    }

    for (let i = 0; i < scenes.length; i++) {
      const sceneShots = shots[i]?.shots || shots[String(i)]?.shots || [];
      for (let j = 0; j < sceneShots.length; j++) {
        if (btn) btn.textContent = `Generating video ${generated + 1}/${total}...`;
        try {
          await generateShotVideo(i, j);
          generated++;
        } catch (err) {
          console.error('Video generation failed:', err);
          const errMsg = String(err?.message || err);
          // Stop immediately on quota/billing errors — don't waste more requests
          if (errMsg.includes('429') || errMsg.includes('RESOURCE_EXHAUSTED') || errMsg.includes('quota')) {
            if (btn) btn.textContent = `Quota exceeded — ${generated}/${total} done`;
            btn.disabled = false;
            alert('Video generation quota exceeded. Please check your Gemini API billing at ai.dev/rate-limit and try again later.');
            buildFinalCutPlaylist();
            return;
          }
        }
      }
    }

    if (btn) { btn.textContent = `Generate All Videos (${generated}/${total} done)`; btn.disabled = false; }
    // Rebuild Final Cut playlist so it picks up the new video URLs
    buildFinalCutPlaylist();
    // Update Final Cut section counts
    const fcSection = document.getElementById('finalCutSection');
    if (fcSection) {
      const statusEl = fcSection.querySelector('span');
      if (statusEl) {
        statusEl.style.color = generated === total ? 'var(--green)' : 'var(--yellow)';
        statusEl.textContent = `${generated}/${total} clips ready`;
      }
      // Enable/disable buttons
      fcSection.querySelectorAll('.final-cut-btn.play, .final-cut-btn.download-all').forEach(b => b.disabled = generated === 0);
      const stitchBtn = fcSection.querySelector('.final-cut-btn.download-stitch');
      if (stitchBtn) stitchBtn.disabled = generated < 2;
      // Update download count
      const dlBtn = fcSection.querySelector('.final-cut-btn.download-all');
      if (dlBtn) dlBtn.textContent = `Download All Clips (${generated})`;
    }
  }

  // ── Final Cut: sequential playback of all clips ──

  let finalCutClips = [];
  let finalCutIndex = 0;
  let finalCutPlaying = false;

  function buildFinalCutPlaylist() {
    const scenes = lastGeneratedData?.scenes || [];
    const shots = lastGeneratedData?.shots || {};
    finalCutClips = [];

    for (let i = 0; i < scenes.length; i++) {
      const sceneShots = (shots[i]?.shots) || (shots[String(i)]?.shots) || [];
      sceneShots.forEach((shot, j) => {
        if (shot.generatedVideoUrl) {
          const ff = shot.firstFrame?.generatedImage;
          finalCutClips.push({
            url: shot.generatedVideoUrl,
            label: `S${i+1} Shot ${j+1}`,
            sceneIdx: i,
            shotIdx: j,
            thumb: ff ? `data:${ff.mimeType};base64,${ff.base64}` : null
          });
        }
      });
    }

    const container = document.getElementById('finalCutPlaylist');
    if (!container) return;

    container.innerHTML = finalCutClips.map((clip, idx) => `
      <div class="final-cut-thumb ${idx === 0 ? 'active' : ''}" onclick="jumpToClip(${idx})" data-clip-idx="${idx}">
        ${clip.thumb ? `<img src="${clip.thumb}" alt="${clip.label}">` : '<div style="width:100%;aspect-ratio:16/9;background:rgba(255,255,255,0.06);border-radius:4px;"></div>'}
        <div>${clip.label}</div>
      </div>
    `).join('');

    // Auto-load the first clip so the player isn't empty
    if (finalCutClips.length > 0) {
      const video = document.getElementById('finalCutVideo');
      if (video && !video.getAttribute('src')) {
        video.src = finalCutClips[0].url;
        video.load();
        updateFinalCutProgress(`Ready to play — ${finalCutClips.length} clips loaded`);
      }
    }

    // Update status text
    const statusEl = document.getElementById('finalCutStatus');
    if (statusEl) {
      const total = (() => { let t=0; const shots=lastGeneratedData?.shots||{}; for(const[,so] of Object.entries(shots)){t+=(so.shots||[]).length} return t; })();
      const ready = finalCutClips.length;
      statusEl.innerHTML = `<span style="color:${ready === total ? 'var(--green)' : 'var(--yellow)'};">${ready}/${total} clips ready</span>` +
        (ready < total ? '<span>— generate remaining videos first</span>' : '<span>— click Play Full Video to watch!</span>');
    }

    // Update buttons
    const section = document.getElementById('finalCutSection');
    if (section) {
      section.querySelectorAll('.final-cut-btn.play, .final-cut-btn.download-all').forEach(b => b.disabled = finalCutClips.length === 0);
      const dlBtn = section.querySelector('.final-cut-btn.download-all');
      if (dlBtn) dlBtn.textContent = `Download All Clips (${finalCutClips.length})`;
      const stitchBtn = section.querySelector('.final-cut-btn.download-stitch');
      if (stitchBtn) stitchBtn.disabled = finalCutClips.length < 2;
    }
  }

  function jumpToClip(idx) {
    if (idx < 0 || idx >= finalCutClips.length) return;
    finalCutIndex = idx;
    const video = document.getElementById('finalCutVideo');
    if (!video) return;
    video.src = finalCutClips[idx].url;
    video.play();
    finalCutPlaying = true;
    updateFinalCutHighlight();
    updateFinalCutProgress(`Playing clip ${idx + 1} of ${finalCutClips.length}: ${finalCutClips[idx].label}`);
  }

  function playFinalCut() {
    if (finalCutClips.length === 0) return;
    const video = document.getElementById('finalCutVideo');
    if (!video) return;

    // Remove old listener to avoid stacking
    video.removeEventListener('ended', onFinalCutClipEnded);
    video.addEventListener('ended', onFinalCutClipEnded);

    finalCutIndex = 0;
    finalCutPlaying = true;
    video.src = finalCutClips[0].url;
    video.play();
    updateFinalCutHighlight();
    updateFinalCutProgress(`Playing clip 1 of ${finalCutClips.length}: ${finalCutClips[0].label}`);
  }

  function onFinalCutClipEnded() {
    if (!finalCutPlaying) return;
    finalCutIndex++;
    if (finalCutIndex < finalCutClips.length) {
      const video = document.getElementById('finalCutVideo');
      video.src = finalCutClips[finalCutIndex].url;
      video.play();
      updateFinalCutHighlight();
      updateFinalCutProgress(`Playing clip ${finalCutIndex + 1} of ${finalCutClips.length}: ${finalCutClips[finalCutIndex].label}`);
    } else {
      finalCutPlaying = false;
      updateFinalCutProgress('Playback complete!');
    }
  }

  function updateFinalCutHighlight() {
    document.querySelectorAll('.final-cut-thumb').forEach((el, i) => {
      el.classList.toggle('active', i === finalCutIndex);
    });
    // Scroll active thumb into view
    const active = document.querySelector('.final-cut-thumb.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  function updateFinalCutProgress(msg) {
    const el = document.getElementById('finalCutProgress');
    if (el) el.textContent = msg;
  }

  // ── Download individual shot ──

  function downloadShotVideo(sceneIdx, shotIdx) {
    const shots = lastGeneratedData?.shots || {};
    const sceneShots = (shots[sceneIdx]?.shots) || (shots[String(sceneIdx)]?.shots) || [];
    const shot = sceneShots[shotIdx];
    if (!shot?.generatedVideoUrl) return;
    const a = document.createElement('a');
    a.href = shot.generatedVideoUrl;
    a.download = `scene${sceneIdx + 1}_shot${shotIdx + 1}.mp4`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // ── Download all clips as individual files ──

  async function downloadAllClips() {
    buildFinalCutPlaylist();
    for (let i = 0; i < finalCutClips.length; i++) {
      const clip = finalCutClips[i];
      updateFinalCutProgress(`Downloading clip ${i + 1} of ${finalCutClips.length}...`);
      try {
        const resp = await fetch(clip.url);
        const blob = await resp.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `scene${clip.sceneIdx + 1}_shot${clip.shotIdx + 1}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        // Small delay between downloads so browser doesn't block them
        await new Promise(r => setTimeout(r, 500));
      } catch (err) {
        console.error('Download failed for clip:', clip.label, err);
      }
    }
    updateFinalCutProgress(`Downloaded ${finalCutClips.length} clips!`);
  }

  // ── Stitch & Download: combines all clips into one video using MediaRecorder ──

  async function stitchAndDownload() {
    buildFinalCutPlaylist();
    if (finalCutClips.length < 2) return;

    const progressEl = document.getElementById('finalCutProgress');
    const stitchBtn = document.querySelector('.final-cut-btn.download-stitch');
    if (stitchBtn) { stitchBtn.disabled = true; stitchBtn.textContent = 'Stitching...'; }

    try {
      // Create offscreen video + canvas for recording
      const offVideo = document.createElement('video');
      offVideo.crossOrigin = 'anonymous';
      offVideo.muted = false;
      offVideo.playsInline = true;

      // Wait for first clip to get dimensions
      await new Promise((resolve, reject) => {
        offVideo.onloadedmetadata = resolve;
        offVideo.onerror = reject;
        offVideo.src = finalCutClips[0].url;
      });

      const w = offVideo.videoWidth || 1280;
      const h = offVideo.videoHeight || 720;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');

      // Set up MediaRecorder on canvas stream + audio
      const canvasStream = canvas.captureStream(30);
      // Try to capture audio from the video element
      let combinedStream = canvasStream;
      try {
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaElementSource(offVideo);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        source.connect(audioCtx.destination);
        const audioTrack = dest.stream.getAudioTracks()[0];
        if (audioTrack) combinedStream = new MediaStream([...canvasStream.getVideoTracks(), audioTrack]);
      } catch (e) {
        // Audio capture not supported or no audio; proceed with video only
      }

      const chunks = [];
      const recorder = new MediaRecorder(combinedStream, {
        mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm'
      });
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

      const stitchDone = new Promise(resolve => { recorder.onstop = resolve; });
      recorder.start();

      // Draw loop
      let drawing = true;
      function drawFrame() {
        if (!drawing) return;
        ctx.drawImage(offVideo, 0, 0, w, h);
        requestAnimationFrame(drawFrame);
      }

      // Start drawing loop
      drawFrame();

      // Play clips sequentially
      for (let i = 0; i < finalCutClips.length; i++) {
        if (progressEl) progressEl.textContent = `Stitching clip ${i + 1} of ${finalCutClips.length}...`;

        await new Promise((resolve, reject) => {
          offVideo.onended = resolve;
          offVideo.onerror = reject;
          offVideo.src = finalCutClips[i].url;
          offVideo.play();
        });
      }

      drawing = false;
      recorder.stop();
      await stitchDone;

      // Download stitched file
      const blob = new Blob(chunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'final_cut.webm';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);

      if (progressEl) progressEl.textContent = 'Final cut downloaded!';
    } catch (err) {
      console.error('Stitch failed:', err);
      if (progressEl) progressEl.textContent = 'Stitch failed: ' + err.message;
    }

    if (stitchBtn) { stitchBtn.disabled = false; stitchBtn.textContent = 'Stitch & Download Final Cut'; }
  }

  // ── Item-level controls ──

  function toggleItemLock(type, idx, btn) {
    const key = type + '-' + idx;
    if (lockedItems.has(key)) {
      lockedItems.delete(key);
      btn.classList.remove('locked');
      btn.textContent = '🔓';
      btn.closest('.item-card')?.classList.remove('item-locked');
    } else {
      lockedItems.add(key);
      btn.classList.add('locked');
      btn.textContent = '🔒';
      btn.closest('.item-card')?.classList.add('item-locked');
    }
  }

  function startItemAi(type, idx) {
    if (lockedItems.has(type + '-' + idx)) {
      alert('Unlock this item first to use AI.');
      return;
    }
    resultAiTarget = type + ':' + idx;
    const bar = document.getElementById('resultAiBar');
    const label = document.getElementById('resultAiLabel');
    const input = document.getElementById('resultAiDirection');
    const names = { concept:'Concept', milestone:'Milestone', character:'Character', location:'Location', scene:'Scene' };
    const displayType = type.startsWith('shot-') ? 'Shot' : (names[type] || type);
    label.textContent = '✨ ' + displayType + ' #' + (idx + 1);
    input.value = '';
    bar.classList.add('visible');
    input.focus();
  }

  function toggleItemEdit(type, idx) {
    if (lockedItems.has(type + '-' + idx)) return;
    const card = document.querySelector('.item-card[data-type="' + type + '"][data-idx="' + idx + '"]');
    if (card) card.classList.toggle('editing');
  }

  function cancelItemEdit(type, idx) {
    const card = document.querySelector('.item-card[data-type="' + type + '"][data-idx="' + idx + '"]');
    if (card) card.classList.remove('editing');
  }

  function saveItemEdit(type, idx) {
    const card = document.querySelector('.item-card[data-type="' + type + '"][data-idx="' + idx + '"]');
    if (!card) return;

    const inputs = card.querySelectorAll('.item-edit-form [data-field]');
    const updates = {};
    inputs.forEach(inp => {
      const field = inp.dataset.field;
      let val = inp.tagName === 'TEXTAREA' ? inp.value : (inp.type === 'number' ? Number(inp.value) : inp.value);
      if (field.includes('.')) {
        const [parent, child] = field.split('.');
        if (!updates[parent]) updates[parent] = {};
        updates[parent][child] = val;
      } else {
        updates[field] = val;
      }
    });

    const d = lastGeneratedData;
    const baseType = type.startsWith('shot-') ? 'shot' : type;
    let target;

    if (baseType === 'concept') target = d.concept;
    else if (baseType === 'milestone') target = d.milestones?.milestones?.[idx];
    else if (baseType === 'character') target = d.characters?.characters?.[idx];
    else if (baseType === 'location') target = d.locations?.locations?.[idx];
    else if (baseType === 'scene') target = d.scenes?.[idx];
    else if (baseType === 'shot') {
      const si = parseInt(type.split('-')[1]);
      const g = d.shots[si] || d.shots[String(si)];
      target = g?.shots?.[idx];
    }

    if (!target) return;

    Object.keys(updates).forEach(k => {
      if (typeof updates[k] === 'object' && !Array.isArray(updates[k]) && target[k] && typeof target[k] === 'object') {
        Object.assign(target[k], updates[k]);
      } else {
        target[k] = updates[k];
      }
    });

    // Type conversions
    if (updates.interior !== undefined) target.interior = updates.interior === 'true' || updates.interior === true;
    if (updates.tensionLevel !== undefined) target.tensionLevel = Number(updates.tensionLevel);
    if (updates.estimatedDurationSeconds !== undefined) target.estimatedDurationSeconds = Number(updates.estimatedDurationSeconds);
    if (updates.durationSeconds !== undefined) target.durationSeconds = Number(updates.durationSeconds);

    renderResults(d, true);
  }

  function moveItem(type, idx, dir) {
    const newIdx = idx + dir;
    const d = lastGeneratedData;
    const baseType = type.startsWith('shot-') ? 'shot' : type;
    let arr;

    if (baseType === 'milestone') arr = d.milestones?.milestones;
    else if (baseType === 'character') arr = d.characters?.characters;
    else if (baseType === 'location') arr = d.locations?.locations;
    else if (baseType === 'scene') arr = d.scenes;
    else if (baseType === 'shot') {
      const si = parseInt(type.split('-')[1]);
      const g = d.shots[si] || d.shots[String(si)];
      arr = g?.shots;
    }

    if (!arr || newIdx < 0 || newIdx >= arr.length) return;

    [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];

    // Update locked items keys
    const oldKey = type + '-' + idx;
    const newKey = type + '-' + newIdx;
    const oldLocked = lockedItems.has(oldKey);
    const newLocked = lockedItems.has(newKey);
    lockedItems.delete(oldKey);
    lockedItems.delete(newKey);
    if (oldLocked) lockedItems.add(newKey);
    if (newLocked) lockedItems.add(oldKey);

    renderResults(d, true);
  }

  function deleteItem(type, idx) {
    if (!confirm('Delete this item?')) return;
    const d = lastGeneratedData;
    const baseType = type.startsWith('shot-') ? 'shot' : type;
    let arr;

    if (baseType === 'milestone') arr = d.milestones?.milestones;
    else if (baseType === 'character') arr = d.characters?.characters;
    else if (baseType === 'location') arr = d.locations?.locations;
    else if (baseType === 'scene') arr = d.scenes;
    else if (baseType === 'shot') {
      const si = parseInt(type.split('-')[1]);
      const g = d.shots[si] || d.shots[String(si)];
      arr = g?.shots;
    }

    if (!arr) return;
    arr.splice(idx, 1);

    // Re-index locked items
    const toRemove = [];
    const toAdd = [];
    lockedItems.forEach(key => {
      if (key.startsWith(type + '-')) {
        const i = parseInt(key.split('-').pop());
        if (i === idx) toRemove.push(key);
        else if (i > idx) {
          toRemove.push(key);
          toAdd.push(type + '-' + (i - 1));
        }
      }
    });
    toRemove.forEach(k => lockedItems.delete(k));
    toAdd.forEach(k => lockedItems.add(k));

    renderResults(d, true);
  }

  function addItem(type) {
    const d = lastGeneratedData;
    if (type === 'milestone') {
      const ms = d.milestones?.milestones;
      if (!ms) return;
      ms.push({ beatId: 'new-beat', title: 'New Milestone', description: '', emotionalTone: '', location: '', stakes: '', characters: [], causedBy: null, leadsTo: null });
      renderResults(d, true);
      setTimeout(() => toggleItemEdit('milestone', ms.length - 1), 50);
    } else if (type === 'character') {
      const chars = d.characters?.characters;
      if (!chars) return;
      chars.push({ name: 'New Character', role: 'supporting', importance: 'secondary', personality: '', appearance: {}, defaultOutfit: {}, accessories: [], voice: {}, speechPattern: '', mannerisms: [], arc: '' });
      renderResults(d, true);
      setTimeout(() => toggleItemEdit('character', chars.length - 1), 50);
    } else if (type === 'location') {
      const locs = d.locations?.locations;
      if (!locs) return;
      locs.push({ name: 'New Location', type: '', description: '', interior: true, dimensions: '', colorScheme: [], keyFeatures: [], furnitureAndProps: [], lightingCondition: '', mood: '' });
      renderResults(d, true);
      setTimeout(() => toggleItemEdit('location', locs.length - 1), 50);
    } else if (type === 'scene') {
      const scenes = d.scenes;
      if (!scenes) return;
      scenes.push({ title: 'New Scene', slugline: 'INT. LOCATION - DAY', description: '', purpose: '', locationName: '', timeOfDay: 'DAY', characters: [], events: [], dialogue: [], tensionLevel: 5, emotionalTone: '', estimatedDurationSeconds: 10, transitionIn: 'CUT TO', transitionOut: 'CUT TO', musicMood: '' });
      renderResults(d, true);
      setTimeout(() => toggleItemEdit('scene', scenes.length - 1), 50);
    }
  }

  function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  }
</script>
