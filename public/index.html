<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Movie Maker</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text2: #9090a8;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --cyan: #22d3ee;
    --pink: #f472b6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1030 0%, #0a0a1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header .tag {
    font-size: 0.7rem;
    background: var(--accent);
    color: white;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-weight: 600;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 400px 1fr;
    min-height: calc(100vh - 65px);
  }

  /* ── Sidebar (Input Form) ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
  }
  .sidebar h2 {
    font-size: 1rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .field {
    margin-bottom: 1rem;
  }
  .field-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.3rem;
  }
  .field label {
    display: block;
    font-size: 0.8rem;
    color: var(--text2);
    font-weight: 500;
  }
  .field-actions {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .field-actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0.1rem 0.3rem;
    border-radius: 4px;
    transition: all 0.15s;
    opacity: 0.4;
    color: var(--text2);
  }
  .field-actions button:hover {
    opacity: 1;
  }
  .field-actions .ai-btn:hover {
    color: var(--accent2);
    background: rgba(99, 102, 241, 0.1);
  }
  .field-actions .ai-btn.loading {
    animation: spin 0.8s linear infinite;
  }
  .field-actions .lock-toggle {
    font-size: 0.7rem;
  }
  .field-actions .lock-toggle.locked {
    opacity: 1;
    color: var(--yellow);
  }

  /* Locked field visual */
  .field.locked input,
  .field.locked select,
  .field.locked textarea {
    border-color: rgba(251, 191, 36, 0.3);
    background: rgba(251, 191, 36, 0.03);
  }
  .field.locked .field-label label {
    color: var(--yellow);
  }
  .format-section.locked .format-grid {
    opacity: 0.6;
    pointer-events: none;
  }
  .format-section.locked .section-label label {
    color: var(--yellow);
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 0.6rem 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea {
    resize: vertical;
    min-height: 70px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }

  /* Kid mode toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    cursor: pointer;
  }
  .toggle input { display: none; }
  .toggle .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 12px;
    transition: 0.2s;
  }
  .toggle .slider::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: 0.2s;
  }
  .toggle input:checked + .slider {
    background: var(--green);
  }
  .toggle input:checked + .slider::after {
    transform: translateX(20px);
  }
  .toggle-label {
    font-size: 0.85rem;
    color: var(--text);
  }

  .kid-options {
    display: none;
    margin-bottom: 1rem;
  }
  .kid-options.visible {
    display: block;
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .generate-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
  }
  .generate-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .generate-btn.loading {
    color: transparent;
  }
  .generate-btn .spinner {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .generate-btn.loading .spinner {
    display: block;
  }
  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* ── Main Content (Results) ── */
  .main {
    padding: 2rem;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--text2);
    text-align: center;
  }
  .empty-state .icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.3;
  }
  .empty-state p {
    font-size: 1.1rem;
    max-width: 400px;
  }

  /* Phase progress bar */
  .progress-bar {
    display: none;
    margin-bottom: 2rem;
  }
  .progress-bar.visible {
    display: block;
  }
  .progress-steps {
    display: flex;
    gap: 0;
  }
  .progress-step {
    flex: 1;
    text-align: center;
    padding: 0.5rem;
    font-size: 0.7rem;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
  }
  .progress-step:first-child { border-radius: 8px 0 0 8px; }
  .progress-step:last-child { border-radius: 0 8px 8px 0; }
  .progress-step.done {
    background: rgba(52, 211, 153, 0.15);
    color: var(--green);
    border-color: rgba(52, 211, 153, 0.3);
  }
  .progress-step.active {
    background: rgba(99, 102, 241, 0.2);
    color: var(--accent2);
    border-color: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Result sections */
  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 1rem 1.2rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    user-select: none;
  }
  .result-header:hover {
    background: rgba(99, 102, 241, 0.05);
  }
  .result-header .emoji {
    font-size: 1.2rem;
  }
  .result-header h3 {
    font-size: 0.95rem;
    font-weight: 600;
    flex: 1;
  }
  .result-header .count {
    font-size: 0.75rem;
    color: var(--text2);
    background: var(--surface);
    padding: 0.15rem 0.6rem;
    border-radius: 10px;
  }
  .result-header .chevron {
    color: var(--text2);
    transition: transform 0.2s;
  }
  .result-section.collapsed .result-body { display: none; }
  .result-section.collapsed .chevron { transform: rotate(-90deg); }

  .result-body {
    padding: 1.2rem;
  }

  /* Concept card */
  .concept-logline {
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--yellow);
    margin-bottom: 1rem;
    font-style: italic;
    line-height: 1.5;
  }
  .concept-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .meta-item {
    background: var(--surface2);
    padding: 0.7rem;
    border-radius: 8px;
  }
  .meta-item .label {
    font-size: 0.7rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.2rem;
  }
  .meta-item .value {
    font-size: 0.85rem;
  }
  .synopsis {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text2);
    white-space: pre-line;
  }

  /* Milestone cards */
  .milestone-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.8rem;
    border-left: 3px solid var(--accent);
  }
  .milestone-card .beat-id {
    font-size: 0.7rem;
    color: var(--accent2);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .milestone-card h4 {
    font-size: 0.95rem;
    margin-bottom: 0.3rem;
  }
  .milestone-card p {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.5;
  }
  .milestone-card .meta {
    display: flex;
    gap: 1rem;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: var(--text2);
  }
  .milestone-card .meta span {
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }

  /* Character cards */
  .character-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.8rem;
  }
  .character-card .char-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.5rem;
  }
  .character-card .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
    color: white;
    flex-shrink: 0;
  }
  .character-card h4 { font-size: 0.95rem; }
  .character-card .role {
    font-size: 0.75rem;
    color: var(--cyan);
  }
  .character-card .personality {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  .char-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--text2);
  }
  .char-details span { display: flex; gap: 0.3rem; }
  .char-details .lbl { color: var(--text2); opacity: 0.6; }

  /* Location cards */
  .location-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.8rem;
  }
  .location-card h4 {
    font-size: 0.95rem;
    margin-bottom: 0.2rem;
  }
  .location-card .type {
    font-size: 0.75rem;
    color: var(--green);
    margin-bottom: 0.5rem;
  }
  .location-card p {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  .color-swatches {
    display: flex;
    gap: 0.3rem;
    margin-top: 0.5rem;
  }
  .swatch {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* Scene cards */
  .scene-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.8rem;
  }
  .scene-card .slugline {
    font-size: 0.75rem;
    color: var(--yellow);
    font-family: 'Courier New', monospace;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .scene-card h4 {
    font-size: 0.95rem;
    margin-bottom: 0.3rem;
  }
  .scene-card .desc {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  .dialogue-preview {
    background: var(--bg);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
    font-family: 'Courier New', monospace;
    margin-top: 0.5rem;
  }
  .dialogue-preview .char-name {
    color: var(--accent2);
    font-weight: 700;
  }
  .dialogue-preview .line-text {
    color: var(--text);
  }
  .dialogue-preview .parenthetical {
    color: var(--text2);
    font-style: italic;
  }

  /* Shot cards */
  .shot-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.6rem;
    border-left: 2px solid var(--cyan);
  }
  .shot-card .shot-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .shot-card .duration {
    font-size: 0.7rem;
    background: var(--bg);
    color: var(--cyan);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-weight: 600;
  }
  .shot-card .camera-info {
    font-size: 0.7rem;
    color: var(--text2);
  }
  .frame-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-top: 0.5rem;
  }
  .frame-box {
    background: var(--bg);
    border-radius: 6px;
    padding: 0.7rem;
  }
  .frame-box .frame-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
    font-weight: 600;
  }
  .frame-box.first .frame-label { color: var(--green); }
  .frame-box.last .frame-label { color: var(--red); }
  .frame-box .frame-desc {
    font-size: 0.78rem;
    color: var(--text2);
    line-height: 1.4;
  }

  /* Error */
  .error-banner {
    display: none;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
    color: var(--red);
  }
  .error-banner.visible { display: block; }

  /* Timer */
  .timer {
    display: none;
    font-size: 0.8rem;
    color: var(--text2);
    text-align: center;
    margin-top: 0.5rem;
  }
  .timer.visible { display: block; }

  /* Format grid */
  .format-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
  }
  /* Genre chips (multi-select) */
  .genre-chips {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
  }
  .genre-chip {
    padding: 0.35rem 0.7rem; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; color: var(--text2); cursor: pointer; font-size: 0.8rem;
    font-family: inherit; font-weight: 500; transition: all 0.2s; user-select: none;
  }
  .genre-chip:hover { border-color: var(--accent); color: var(--text); }
  .genre-chip.selected {
    background: rgba(99, 102, 241, 0.2); border-color: var(--accent); color: var(--accent2); font-weight: 600;
  }
  .format-card {
    padding: 0.6rem 0.4rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: inherit;
  }
  .format-card:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .format-card.active {
    background: rgba(99, 102, 241, 0.15);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .fmt-label {
    font-size: 0.8rem;
    font-weight: 600;
  }
  .fmt-dur {
    font-size: 0.65rem;
    opacity: 0.6;
    margin-top: 0.15rem;
  }

  /* Plan preview */
  .plan-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    margin-bottom: 1rem;
  }
  .plan-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    padding: 0.2rem 0;
    color: var(--text2);
  }
  .plan-row span:last-child {
    color: var(--text);
    font-weight: 500;
  }

  /* (lock + AI buttons are now in .field-actions above) */

  .randomize-all-btn {
    width: 100%;
    padding: 0.6rem;
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
    border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 8px;
    color: var(--yellow);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .randomize-all-btn:hover {
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.25), rgba(251, 191, 36, 0.1));
    border-color: var(--yellow);
  }
  .randomize-all-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .randomize-all-btn .spinner-sm {
    display: none;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(251, 191, 36, 0.3);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .randomize-all-btn.loading .spinner-sm { display: inline-block; }
  .randomize-all-btn.loading .dice-icon { display: none; }

  /* AI prompt bar */
  .ai-prompt-bar {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 0.4rem;
    margin-bottom: 0.8rem;
    gap: 0.4rem;
    align-items: center;
    animation: slideIn 0.2s ease;
  }
  .ai-prompt-bar.visible {
    display: flex;
  }
  .ai-prompt-bar .prompt-label {
    font-size: 0.7rem;
    color: var(--accent2);
    white-space: nowrap;
    padding: 0 0.3rem;
    font-weight: 600;
  }
  .ai-prompt-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
    outline: none;
    font-family: inherit;
  }
  .ai-prompt-bar input:focus {
    border-color: var(--accent);
  }
  .ai-prompt-bar button {
    padding: 0.35rem 0.7rem;
    border: none;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
  }
  .ai-prompt-bar button:first-of-type {
    background: var(--accent);
    color: white;
  }
  .ai-prompt-bar button:first-of-type:hover {
    background: var(--accent2);
  }
  .ai-prompt-bar button.cancel {
    background: transparent;
    color: var(--text2);
    padding: 0.35rem 0.5rem;
  }
  .ai-prompt-bar button.cancel:hover {
    color: var(--red);
  }

  /* Result section controls */
  .result-actions {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-left: auto;
    margin-right: 0.5rem;
  }
  .result-ai-btn, .result-lock-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    transition: all 0.15s;
    opacity: 0.5;
    color: var(--text2);
  }
  .result-ai-btn:hover { opacity: 1; color: var(--accent2); background: rgba(99,102,241,0.1); }
  .result-lock-btn.locked { opacity: 1; color: var(--yellow); }
  .result-lock-btn:hover { opacity: 1; }
  .result-section.unlocked { border-color: rgba(99,102,241,0.3); }

  /* Result AI bar */
  .result-ai-bar {
    display: none;

    padding: 0 0.3rem; font-weight: 600;
  }
  .result-ai-bar input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.8rem;
    padding: 0.4rem 0.6rem; outline: none; font-family: inherit;
  }

  .result-ai-bar button {
    padding: 0.35rem 0.7rem; border: none; border-radius: 6px;
    font-size: 0.8rem; cursor: pointer; font-weight: 600; font-family: inherit;
  }
  .result-ai-bar .go-btn { background: var(--accent); color: white; }
  .result-ai-bar .go-btn:hover { background: var(--accent2); }
  .result-ai-bar .cancel-btn { background: transparent; color: var(--text2); }
  .result-ai-bar .cancel-btn:hover { color: var(--red); }

  /* Approve bar */
  .approve-bar {
    display: flex; gap: 0.8rem; margin-top: 1.5rem; padding: 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  }
  .approve-btn {
    flex: 1; padding: 1rem;
    background: linear-gradient(135deg, var(--green), #059669);
    border: none; border-radius: 10px; color: white;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .approve-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(52,211,153,0.4); }
  .regenerate-all-btn {
    padding: 1rem 1.5rem;
    background: rgba(99,102,241,0.1); border: 1px solid var(--accent);
    border-radius: 10px; color: var(--accent2);
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .regenerate-all-btn:hover { background: rgba(99,102,241,0.2); }
  .approve-bar.streaming-disabled { opacity: 0.5; }
  .approve-bar.streaming-disabled button { cursor: not-allowed; pointer-events: none; }
  .approve-btn:disabled { background: linear-gradient(135deg, #374151, #4b5563); transform: none; box-shadow: none; }
  .regenerate-all-btn:disabled { opacity: 0.5; }

  /* Timeline view */
  .timeline-view { display: none; }
  .timeline-view.visible { display: block; }
  .timeline-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;
  }
  .timeline-header h2 { font-size: 1.2rem; font-weight: 700; }
  .timeline-header .back-btn {
    padding: 0.4rem 0.8rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 0.8rem; font-family: inherit;
  }
  .timeline-header .back-btn:hover { color: var(--text); border-color: var(--accent); }
  .timeline-summary { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .timeline-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.8rem;
  }
  .timeline-stat .stat-val { font-weight: 700; color: var(--accent2); }
  .timeline-scenes { display: flex; flex-direction: column; gap: 2rem; }
  .timeline-scene-group {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }
  .timeline-scene-header {
    padding: 0.8rem 1rem; background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.6rem;
  }
  .timeline-scene-header .scene-num {
    background: var(--accent); color: white; padding: 0.15rem 0.5rem;
    border-radius: 4px; font-size: 0.7rem; font-weight: 700;
  }
  .timeline-scene-header h4 { font-size: 0.9rem; flex: 1; }
  .timeline-scene-header .scene-dur { font-size: 0.75rem; color: var(--text2); }
  .timeline-track {
    display: flex; overflow-x: auto; padding: 1rem; gap: 0.8rem;
  }
  .timeline-track::-webkit-scrollbar { height: 6px; }
  .timeline-track::-webkit-scrollbar-track { background: var(--bg); border-radius: 3px; }
  .timeline-track::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .timeline-shot {
    min-width: 280px; max-width: 280px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-shrink: 0;
  }
  .timeline-shot-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5rem 0.7rem; background: var(--surface2); border-bottom: 1px solid var(--border);
  }
  .timeline-shot-header .shot-num { font-size: 0.75rem; font-weight: 700; color: var(--cyan); }
  .timeline-shot-header .shot-dur {
    font-size: 0.7rem; color: var(--text2); background: var(--bg);
    padding: 0.1rem 0.4rem; border-radius: 4px;
  }
  .timeline-shot-header .shot-camera { font-size: 0.65rem; color: var(--text2); }
  .timeline-frames { display: grid; grid-template-columns: 1fr 1fr; }
  .timeline-frame { padding: 0.6rem; }
  .timeline-frame:first-child { border-right: 1px solid var(--border); }
  .timeline-frame .frame-label {
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 700; margin-bottom: 0.3rem;
  }
  .timeline-frame.first .frame-label { color: var(--green); }
  .timeline-frame.last .frame-label { color: var(--red); }
  .timeline-frame .frame-img-placeholder {
    width: 100%; aspect-ratio: 16/9; background: var(--surface2);
    border: 1px dashed var(--border); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; opacity: 0.3; margin-bottom: 0.4rem;
  }
  .timeline-frame .frame-prompt {
    font-size: 0.68rem; color: var(--text2); line-height: 1.4;
    max-height: 60px; overflow-y: auto;
  }
  .timeline-shot-actions {
    padding: 0.5rem 0.7rem; border-top: 1px solid var(--border); display: flex; gap: 0.4rem;
  }
  .shot-gen-btn {
    flex: 1; padding: 0.4rem;
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none; border-radius: 6px; color: white;
    font-size: 0.75rem; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .shot-gen-btn:hover { box-shadow: 0 2px 10px rgba(99,102,241,0.3); }
  .generate-all-images-btn {
    width: 100%; padding: 0.8rem;
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none; border-radius: 10px; color: white;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    margin-bottom: 1.5rem; font-family: inherit; transition: all 0.2s;
  }
  .generate-all-images-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }

  /* Final Cut Preview */
  .final-cut-section {
    margin-top: 2rem; padding: 1.5rem; background: rgba(0,0,0,0.3);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .final-cut-section h3 {
    margin: 0 0 1rem; font-size: 1.1rem; color: var(--text);
  }
  .final-cut-player {
    position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden;
    aspect-ratio: 16/9; margin-bottom: 1rem;
  }
  .final-cut-player video {
    width: 100%; height: 100%; object-fit: contain; display: block;
  }
  .final-cut-playlist {
    display: flex; gap: 0.4rem; overflow-x: auto; padding: 0.5rem 0;
  }
  .final-cut-thumb {
    flex-shrink: 0; width: 80px; padding: 0.3rem; border-radius: 6px;
    background: rgba(255,255,255,0.05); border: 2px solid transparent;
    cursor: pointer; text-align: center; font-size: 0.6rem; color: var(--text2);
    transition: border-color 0.2s;
  }
  .final-cut-thumb.active { border-color: var(--accent); }
  .final-cut-thumb img { width: 100%; border-radius: 4px; margin-bottom: 0.2rem; }
  .final-cut-actions {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;
  }
  .final-cut-btn {
    padding: 0.6rem 1.2rem; border: none; border-radius: 8px; color: white;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .final-cut-btn:hover { transform: translateY(-1px); }
  .final-cut-btn.play { background: linear-gradient(135deg, #10b981, #059669); }
  .final-cut-btn.download-all { background: linear-gradient(135deg, var(--accent), #4f46e5); }
  .final-cut-btn.download-stitch { background: linear-gradient(135deg, var(--pink), #e11d48); }
  .final-cut-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .final-cut-progress {
    margin-top: 0.5rem; font-size: 0.75rem; color: var(--text2); min-height: 1.2rem;
  }
  .shot-download-btn {
    padding: 0.3rem 0.6rem; background: rgba(255,255,255,0.1); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text2); font-size: 0.65rem; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .shot-download-btn:hover { background: rgba(255,255,255,0.2); color: var(--text); }

  /* Pre-Production view */
  .preproduction-view { display: none; }
  .preproduction-view.visible { display: block; }
  .preproduction-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;
  }
  .preproduction-header h2 { font-size: 1.2rem; font-weight: 700; }
  .preproduction-header .back-btn {
    padding: 0.4rem 0.8rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 0.8rem; font-family: inherit;
  }
  .preproduction-header .back-btn:hover { color: var(--text); border-color: var(--accent); }

  .pp-tabs {
    display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border);
  }
  .pp-tab {
    padding: 0.6rem 1.2rem; cursor: pointer; font-size: 0.85rem; font-weight: 600;
    color: var(--text2); background: none; border: none; font-family: inherit;
    border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s;
  }
  .pp-tab:hover { color: var(--text); }
  .tab-loading-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--yellow); margin-left: 4px; vertical-align: middle;
    animation: tab-pulse 1s ease-in-out infinite;
  }
  @keyframes tab-pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .pp-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

  .pp-panel { display: none; }
  .pp-panel.active { display: block; }

  /* Character Sheet */
  .pp-char-sheet {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.2rem; margin-bottom: 1rem;
  }
  .pp-char-sheet .char-top { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .pp-char-sheet .char-portrait {
    width: 120px; height: 160px; background: var(--surface2); border: 2px dashed var(--border);
    border-radius: 8px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex-shrink: 0; gap: 0.3rem;
  }
  .pp-char-sheet .char-portrait .placeholder-icon { font-size: 2rem; opacity: 0.3; }
  .pp-char-sheet .char-portrait .gen-ref-btn {
    padding: 0.2rem 0.5rem; background: var(--accent); color: white; border: none;
    border-radius: 4px; font-size: 0.65rem; cursor: pointer; font-family: inherit;
  }
  .pp-char-sheet .char-portrait .gen-ref-btn:hover { background: var(--accent2); }
  .pp-char-info { flex: 1; }
  .pp-char-info h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .pp-char-info .role-tag {
    font-size: 0.7rem; color: var(--cyan); margin-bottom: 0.5rem;
  }
  .pp-appearance-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.4rem;
    font-size: 0.78rem; color: var(--text2);
  }
  .pp-appearance-grid .pp-attr {
    background: var(--surface2); padding: 0.3rem 0.5rem; border-radius: 4px;
  }
  .pp-appearance-grid .pp-attr .lbl { font-size: 0.6rem; color: var(--text2); opacity: 0.6; text-transform: uppercase; }
  .pp-outfit-summary {
    background: var(--surface2); padding: 0.6rem; border-radius: 6px; margin-top: 0.6rem;
    font-size: 0.8rem; color: var(--text2);
  }
  .pp-outfit-summary h4 { font-size: 0.78rem; color: var(--text); margin-bottom: 0.3rem; }
  .pp-accessories-list {
    display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem;
  }
  .pp-accessory-chip {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 0.2rem 0.5rem; font-size: 0.7rem; color: var(--text2);
  }
  .pp-asset-actions {
    display: flex; gap: 0.4rem; margin-top: 0.6rem;
  }
  .pp-asset-actions button {
    padding: 0.3rem 0.7rem; border-radius: 5px; font-size: 0.72rem;
    font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all 0.15s;
  }
  .pp-accept-btn { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3) !important; }
  .pp-accept-btn:hover { background: rgba(52,211,153,0.25); }
  .pp-accept-btn.accepted { background: var(--green); color: white; }
  .pp-reject-btn { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.3) !important; }
  .pp-reject-btn:hover { background: rgba(248,113,113,0.2); }
  .pp-regen-btn { background: rgba(99,102,241,0.1); color: var(--accent2); border: 1px solid rgba(99,102,241,0.3) !important; }
  .pp-regen-btn:hover { background: rgba(99,102,241,0.2); }

  /* Wardrobe matrix */
  .wardrobe-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .wardrobe-table th {
    background: var(--surface2); padding: 0.5rem; text-align: left;
    font-size: 0.7rem; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.03em; border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }
  .wardrobe-table td {
    padding: 0.5rem; border-bottom: 1px solid var(--border); vertical-align: top;
  }
  .wardrobe-cell {
    background: var(--surface2); border-radius: 6px; padding: 0.5rem; min-width: 140px;
    cursor: pointer; transition: all 0.15s;
  }
  .wardrobe-cell:hover { border-color: var(--accent); background: rgba(99,102,241,0.05); }
  .wardrobe-cell .outfit-name { font-weight: 600; font-size: 0.75rem; color: var(--text); margin-bottom: 0.2rem; }
  .wardrobe-cell .outfit-thumb {
    width: 100%; aspect-ratio: 1; background: var(--bg); border: 1px dashed var(--border);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; opacity: 0.3; margin-bottom: 0.3rem;
  }
  .wardrobe-cell .outfit-desc { font-size: 0.68rem; color: var(--text2); line-height: 1.3; }

  /* Location sheets */
  .pp-location-sheet {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.2rem; margin-bottom: 1rem;
  }
  .pp-location-sheet .loc-top { display: flex; gap: 1rem; margin-bottom: 0.8rem; }
  .pp-location-sheet .loc-preview {
    width: 200px; height: 120px; background: var(--surface2); border: 2px dashed var(--border);
    border-radius: 8px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex-shrink: 0; gap: 0.3rem;
  }
  .pp-location-sheet .loc-preview .placeholder-icon { font-size: 2rem; opacity: 0.3; }
  .pp-location-sheet .loc-preview .gen-bg-btn {
    padding: 0.2rem 0.5rem; background: var(--accent); color: white; border: none;
    border-radius: 4px; font-size: 0.65rem; cursor: pointer; font-family: inherit;
  }
  .pp-location-sheet .loc-preview .gen-bg-btn:hover { background: var(--accent2); }
  .pp-location-sheet .loc-info { flex: 1; }
  .pp-location-sheet .loc-info h3 { font-size: 1rem; margin-bottom: 0.2rem; }
  .pp-location-sheet .loc-meta {
    display: flex; gap: 0.6rem; font-size: 0.75rem; color: var(--text2); margin-bottom: 0.5rem; flex-wrap: wrap;
  }
  .pp-location-sheet .loc-meta span { background: var(--surface2); padding: 0.15rem 0.4rem; border-radius: 3px; }
  .pp-location-sheet .loc-desc { font-size: 0.85rem; color: var(--text2); line-height: 1.5; }
  .pp-location-sheet .loc-scenes {
    margin-top: 0.5rem; font-size: 0.75rem; color: var(--text2);
  }

  /* Scene breakdown */
  .pp-scene-breakdown {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.2rem; margin-bottom: 1rem;
  }
  .pp-scene-breakdown h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .pp-scene-breakdown .slugline-tag {
    font-size: 0.7rem; color: var(--yellow); font-family: monospace; font-weight: 700; margin-bottom: 0.5rem;
  }
  .pp-scene-breakdown .breakdown-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.6rem;
  }
  .pp-scene-breakdown .bd-col {
    background: var(--surface2); border-radius: 6px; padding: 0.6rem;
  }
  .pp-scene-breakdown .bd-col h4 {
    font-size: 0.7rem; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.03em; margin-bottom: 0.3rem;
  }
  .pp-scene-breakdown .bd-col p { font-size: 0.8rem; color: var(--text); line-height: 1.4; }
  .pp-continuity-note {
    background: rgba(251,191,36,0.05); border: 1px solid rgba(251,191,36,0.2);
    border-radius: 6px; padding: 0.5rem; font-size: 0.78rem; color: var(--yellow);
  }
  .pp-signoff {
    display: flex; align-items: center; gap: 0.5rem; margin-top: 0.6rem;
    font-size: 0.8rem; color: var(--text2);
  }
  .pp-signoff input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }
  .pp-signoff.signed-off { color: var(--green); }

  /* Proceed button */
  .pp-proceed-bar {
    display: flex; gap: 0.8rem; margin-top: 1.5rem; padding: 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  }
  .pp-back-btn {
    padding: 1rem 1.5rem; background: rgba(99,102,241,0.1); border: 1px solid var(--accent);
    border-radius: 10px; color: var(--accent2); font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .pp-back-btn:hover { background: rgba(99,102,241,0.2); }
  .pp-proceed-btn {
    flex: 1; padding: 1rem; background: linear-gradient(135deg, var(--green), #059669);
    border: none; border-radius: 10px; color: white; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .pp-proceed-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(52,211,153,0.4); }
  .pp-proceed-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .pp-loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 3rem; color: var(--text2); gap: 1rem;
  }
  .pp-loading .spinner-lg {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Item-level controls */
  .item-card { position: relative; }
  .item-toolbar {
    display: flex; gap: 0.15rem; position: absolute; top: 0.4rem; right: 0.4rem;
    opacity: 0; transition: opacity 0.15s; z-index: 1;
  }
  .item-card:hover .item-toolbar, .item-card.item-locked .item-toolbar { opacity: 1; }
  .item-toolbar button {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    font-size: 0.6rem; padding: 0.12rem 0.25rem; border-radius: 3px;
    cursor: pointer; transition: all 0.1s; line-height: 1;
  }
  .item-toolbar button:hover { color: var(--text); border-color: var(--accent); }
  .item-toolbar .it-lock.locked { color: var(--yellow); border-color: rgba(251,191,36,0.4); }
  .item-toolbar .it-del:hover { color: var(--red); border-color: rgba(248,113,113,0.4); }
  .item-card.item-locked { opacity: 0.65; border-left-color: var(--yellow) !important; }
  .item-edit-form {
    display: none; flex-direction: column; gap: 0.4rem; padding: 0.3rem 0;
  }
  .item-edit-form.visible { display: flex; }
  .item-card.editing .item-view { display: none; }
  .item-card.editing .item-edit-form { display: flex; }
  .ef-row { display: flex; flex-direction: column; gap: 0.15rem; }
  .ef-label { font-size: 0.6rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.03em; }
  .item-edit-form input, .item-edit-form textarea, .item-edit-form select {
    width: 100%; padding: 0.35rem 0.5rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: 5px; color: var(--text);
    font-size: 0.78rem; font-family: inherit; outline: none;
  }
  .item-edit-form input:focus, .item-edit-form textarea:focus { border-color: var(--accent); }
  .item-edit-form textarea { resize: vertical; min-height: 45px; }
  .edit-actions { display: flex; gap: 0.3rem; justify-content: flex-end; margin-top: 0.2rem; }
  .edit-actions button {
    padding: 0.25rem 0.6rem; border-radius: 5px; font-size: 0.72rem;
    font-weight: 600; cursor: pointer; font-family: inherit; border: none;
  }
  .save-edit-btn { background: var(--accent); color: white; }
  .save-edit-btn:hover { background: var(--accent2); }
  .cancel-edit-btn { background: transparent; color: var(--text2); border: 1px solid var(--border) !important; }
  .add-item-btn {
    width: 100%; padding: 0.45rem; background: transparent;
    border: 1px dashed var(--border); border-radius: 8px; color: var(--text2);
    font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
    margin-top: 0.5rem; font-family: inherit;
  }
  .add-item-btn:hover { color: var(--accent2); border-color: var(--accent); background: rgba(99,102,241,0.05); }

  /* Pre-production item controls */
  .pp-item-card { position: relative; }
  .pp-item-toolbar {
    display: flex; gap: 0.2rem; position: absolute; top: 0.4rem; right: 0.4rem;
    opacity: 0; transition: opacity 0.15s; z-index: 2;
  }
  .pp-item-card:hover .pp-item-toolbar, .pp-item-card.pp-locked .pp-item-toolbar { opacity: 1; }
  .pp-item-toolbar button {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    font-size: 0.6rem; padding: 0.12rem 0.25rem; border-radius: 3px;
    cursor: pointer; transition: all 0.1s; line-height: 1;
  }
  .pp-item-toolbar button:hover { color: var(--text); border-color: var(--accent); }
  .pp-item-toolbar .pp-lock-btn.locked { color: var(--yellow); border-color: rgba(251,191,36,0.4); }
  .pp-item-card.pp-locked { opacity: 0.65; border-left: 3px solid var(--yellow) !important; }
  .pp-item-card.pp-editing .pp-item-view { display: none; }
  .pp-item-card.pp-editing .pp-edit-form { display: flex; }
  .pp-edit-form {
    display: none; flex-direction: column; gap: 0.4rem; padding: 0.3rem 0;
  }
  .pp-edit-form input, .pp-edit-form textarea, .pp-edit-form select {
    width: 100%; padding: 0.35rem 0.5rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: 5px; color: var(--text);
    font-size: 0.78rem; font-family: inherit; outline: none;
  }
  .pp-edit-form input:focus, .pp-edit-form textarea:focus { border-color: var(--accent); }
  .pp-edit-form textarea { resize: vertical; min-height: 45px; }
  .pp-upload-ref-btn {
    background: rgba(34,211,238,0.1); border: 1px dashed var(--cyan); color: var(--cyan);
    font-size: 0.68rem; padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .pp-upload-ref-btn:hover { background: rgba(34,211,238,0.2); }
  .pp-upload-ref-btn.has-ref { border-style: solid; background: rgba(34,211,238,0.15); }
  .pp-ref-thumb {
    width: 40px; height: 40px; border-radius: 4px; object-fit: cover; border: 1px solid var(--cyan);
  }

  /* Responsive */
  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
    }
    .sidebar {
      max-height: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .main {
      max-height: none;
    }
  }
</style>
</head>
<body>

<header>
  <h1>AI Movie Maker</h1>
  <span class="tag">v0.1.0</span>
</header>

<div class="app">
  <!-- ── Sidebar: Input Form ── -->
  <div class="sidebar">
    <h2>Create Your Movie</h2>

    <!-- AI direction prompt (hidden until AI btn clicked) -->
    <div class="ai-prompt-bar" id="aiPromptBar">
      <span class="prompt-label" id="aiPromptLabel">AI: all</span>
      <input type="text" id="aiDirection" placeholder="Optional direction, e.g. 'something noir'..." onkeydown="if(event.key==='Enter')executeAiGenerate();if(event.key==='Escape')cancelAiPrompt();">
      <button onclick="executeAiGenerate()">Go ✨</button>
      <button class="cancel" onclick="cancelAiPrompt()">&times;</button>
    </div>

    <button class="randomize-all-btn" id="randomizeAllBtn" onclick="startAiGenerate('all')">
      <span class="dice-icon">✨</span>
      <span class="spinner-sm"></span>
      AI Generate All
    </button>

    <div class="field" id="field-title">
      <div class="field-label">
        <label>Title</label>
        <div class="field-actions">
          <button class="ai-btn" onclick="startAiGenerate('title')" title="AI generate title">✨ AI</button>
          <button class="lock-toggle" onclick="toggleLock('title')">🔓</button>
        </div>
      </div>
      <input type="text" id="title" value="" placeholder="Enter your movie title (optional — AI will generate one if blank)">
    </div>

    <div class="field" id="field-genre">
      <div class="field-label">
        <label>Genre</label>
        <div class="field-actions">
          <button class="ai-btn" onclick="startAiGenerate('genre')" title="AI generate genre">✨ AI</button>
          <button class="lock-toggle" onclick="toggleLock('genre')">🔓</button>
        </div>
      </div>
      <div class="genre-chips" id="genre">
        <button class="genre-chip selected" data-genre="drama" onclick="toggleGenre(this)">Drama</button>
        <button class="genre-chip" data-genre="comedy" onclick="toggleGenre(this)">Comedy</button>
        <button class="genre-chip" data-genre="horror" onclick="toggleGenre(this)">Horror</button>
        <button class="genre-chip" data-genre="thriller" onclick="toggleGenre(this)">Thriller</button>
        <button class="genre-chip" data-genre="romance" onclick="toggleGenre(this)">Romance</button>
        <button class="genre-chip" data-genre="action" onclick="toggleGenre(this)">Action</button>
        <button class="genre-chip" data-genre="sci-fi" onclick="toggleGenre(this)">Sci-Fi</button>
        <button class="genre-chip" data-genre="fantasy" onclick="toggleGenre(this)">Fantasy</button>
        <button class="genre-chip" data-genre="mystery" onclick="toggleGenre(this)">Mystery</button>
        <button class="genre-chip" data-genre="adventure" onclick="toggleGenre(this)">Adventure</button>
        <button class="genre-chip" data-genre="animation" onclick="toggleGenre(this)">Animation</button>
        <button class="genre-chip" data-genre="family" onclick="toggleGenre(this)">Family</button>
        <button class="genre-chip" data-genre="documentary" onclick="toggleGenre(this)">Documentary</button>
        <button class="genre-chip" data-genre="musical" onclick="toggleGenre(this)">Musical</button>
        <button class="genre-chip" data-genre="noir" onclick="toggleGenre(this)">Noir</button>
        <button class="genre-chip" data-genre="western" onclick="toggleGenre(this)">Western</button>
      </div>
    </div>

    <div class="field" id="field-format">
      <div class="field-label">
        <label>Format & Duration</label>
        <div class="field-actions">
          <button class="ai-btn" onclick="startAiGenerate('format')" title="AI pick format">✨ AI</button>
          <button class="lock-toggle" onclick="toggleLock('format')">🔓</button>
        </div>
      </div>
      <div class="format-grid" id="formatGrid">
        <button class="format-card" data-format="ad-commercial-15" onclick="selectFormat(this)">
          <div class="fmt-label">15s Ad</div>
          <div class="fmt-dur">~5 shots</div>
        </button>
        <button class="format-card" data-format="ad-commercial-30" onclick="selectFormat(this)">
          <div class="fmt-label">30s Ad</div>
          <div class="fmt-dur">~8 shots</div>
        </button>
        <button class="format-card" data-format="ad-commercial-60" onclick="selectFormat(this)">
          <div class="fmt-label">60s Ad</div>
          <div class="fmt-dur">~15 shots</div>
        </button>
        <button class="format-card" data-format="trailer" onclick="selectFormat(this)">
          <div class="fmt-label">Trailer</div>
          <div class="fmt-dur">1-2 min</div>
        </button>
        <button class="format-card" data-format="music-video" onclick="selectFormat(this)">
          <div class="fmt-label">Music Video</div>
          <div class="fmt-dur">3-4 min</div>
        </button>
        <button class="format-card" data-format="short-film" onclick="selectFormat(this)">
          <div class="fmt-label">Short Film</div>
          <div class="fmt-dur">5-15 min</div>
        </button>
      </div>
      <div class="plan-preview" id="planPreview">
        <div class="plan-row"><span>Duration</span><span id="planDuration">60s</span></div>
        <div class="plan-row"><span>Scenes</span><span id="planScenes">~4</span></div>
        <div class="plan-row"><span>Shots</span><span id="planShots">~15</span></div>
        <div class="plan-row"><span>Characters</span><span id="planChars">max 4</span></div>
        <div class="plan-row"><span>Locations</span><span id="planLocs">max 3</span></div>
        <div class="plan-row"><span>Est. Cost</span><span id="planCost">~$7.00</span></div>
      </div>
    </div>

    <div class="field" id="field-mainPlot">
      <div class="field-label">
        <label>Main Plot</label>
        <div class="field-actions">
          <button class="ai-btn" onclick="startAiGenerate('mainPlot')" title="AI generate plot">✨ AI</button>
          <button class="lock-toggle" onclick="toggleLock('mainPlot')">🔓</button>
        </div>
      </div>
      <textarea id="mainPlot" rows="3" placeholder="Describe the main plot or leave empty for AI..."></textarea>
    </div>

    <div class="field" id="field-tone">
      <div class="field-label">
        <label>Tone / Feel</label>
        <div class="field-actions">
          <button class="ai-btn" onclick="startAiGenerate('tone')" title="AI generate tone">✨ AI</button>
          <button class="lock-toggle" onclick="toggleLock('tone')">🔓</button>
        </div>
      </div>
      <input type="text" id="tone" placeholder="e.g., dark and gritty, lighthearted..." value="">
    </div>

    <div class="field" id="field-intendedEnding">
      <div class="field-label">
        <label>Intended Ending</label>
        <div class="field-actions">
          <button class="ai-btn" onclick="startAiGenerate('intendedEnding')" title="AI generate ending">✨ AI</button>
          <button class="lock-toggle" onclick="toggleLock('intendedEnding')">🔓</button>
        </div>
      </div>
      <textarea id="ending" rows="2" placeholder="How should it end? Leave empty for AI to decide..."></textarea>
    </div>

    <div class="field" id="field-visualStyle">
      <div class="field-label">
        <label>Visual Style</label>
        <div class="field-actions">
          <button class="ai-btn" onclick="startAiGenerate('visualStyle')" title="AI generate style">✨ AI</button>
          <button class="lock-toggle" onclick="toggleLock('visualStyle')">🔓</button>
        </div>
      </div>
      <input type="text" id="visualStyle" placeholder="e.g., cinematic, cartoon..." value="">
    </div>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="kidMode">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Kid-Friendly Mode</span>
    </div>

    <div class="kid-options" id="kidOptions">
      <div class="field">
        <label>Age Range</label>
        <select id="kidAgeRange">
          <option value="toddler">Toddlers (2-5)</option>
          <option value="kids" selected>Kids (6-9)</option>
          <option value="tweens">Tweens (10-12)</option>
        </select>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generate()">
      Generate Movie
      <div class="spinner"></div>
    </button>
    <div class="timer" id="timer">Elapsed: 0s</div>
  </div>

  <!-- ── Main: Results ── -->
  <div class="main" id="results">
    <div class="progress-bar" id="progressBar">
      <div class="progress-steps">
        <div class="progress-step" data-p="concept">Concept</div>
        <div class="progress-step" data-p="milestones">Milestones</div>
        <div class="progress-step" data-p="characters">Characters</div>
        <div class="progress-step" data-p="locations">Locations</div>
        <div class="progress-step" data-p="scenes">Scenes</div>
        <div class="progress-step" data-p="shots">Shots</div>
      </div>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div class="result-ai-bar" id="resultAiBar">
      <span class="prompt-label" id="resultAiLabel">✨ Concept</span>
      <input type="text" id="resultAiDirection" placeholder="Optional direction..."
        onkeydown="if(event.key==='Enter')executeResultAi();if(event.key==='Escape')cancelResultAi();">
      <button class="go-btn" onclick="executeResultAi()">Go ✨</button>
      <button class="cancel-btn" onclick="cancelResultAi()">&times;</button>
    </div>

    <div id="resultContent">
      <div class="empty-state">
        <div class="icon">🎬</div>
        <p>Configure your movie on the left and hit <strong>Generate</strong> to start the AI pipeline.</p>
      </div>
    </div>

    <div class="preproduction-view" id="preproductionView"></div>
    <div class="timeline-view" id="timelineView"></div>
  </div>
</div>

<script>
  // ── State ──
  let timerInterval = null;
  let selectedFormat = '';
  const sessionId = 'session_' + Math.random().toString(36).slice(2);

  // ── Genre multi-select ──
  function toggleGenre(chip) {
    chip.classList.toggle('selected');
    // Ensure at least one genre is selected
    const selected = document.querySelectorAll('.genre-chip.selected');
    if (selected.length === 0) chip.classList.add('selected');
  }

  function getSelectedGenres() {
    return [...document.querySelectorAll('.genre-chip.selected')].map(c => c.dataset.genre);
  }

  function getGenreString() {
    return getSelectedGenres().join(', ');
  }

  // ── Format selection ──
  function selectFormat(btn) {
    document.querySelectorAll('.format-card').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedFormat = btn.dataset.format;
    loadPlan(selectedFormat);
  }

  async function loadPlan(format) {
    try {
      const res = await fetch(`/api/plan/${format}`);
      const plan = await res.json();
      document.getElementById('planDuration').textContent = plan.totalDurationSeconds + 's';
      document.getElementById('planScenes').textContent = '~' + plan.estimatedScenes;
      document.getElementById('planShots').textContent = '~' + plan.estimatedShots;
      document.getElementById('planChars').textContent = 'max ' + plan.maxCharacters;
      document.getElementById('planLocs').textContent = 'max ' + plan.maxLocations;
      document.getElementById('planCost').textContent = plan.estimatedCost;
    } catch (e) {
      console.error('Failed to load plan:', e);
    }
  }

  // ── Auto-randomize all fields on page load ──
  async function autoRandomizeOnLoad() {
    const allBtn = document.getElementById('randomizeAllBtn');
    if (allBtn) { allBtn.disabled = true; allBtn.classList.add('loading'); }
    try {
      const res = await fetch('/api/randomize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fields: ['title', 'genre', 'format', 'mainPlot', 'tone', 'intendedEnding', 'visualStyle'],
          context: {},
        }),
      });
      const data = await res.json();
      if (res.ok) {
        applyValues(data);
      } else {
        // Fallback: pick random genre + format from available options
        fallbackRandomize();
      }
    } catch (e) {
      console.error('Auto-randomize failed, using fallback:', e);
      fallbackRandomize();
    } finally {
      if (allBtn) { allBtn.disabled = false; allBtn.classList.remove('loading'); }
    }
  }

  function fallbackRandomize() {
    // Random genre (select 1-2 random genres)
    const chips = [...document.querySelectorAll('.genre-chip')];
    chips.forEach(c => c.classList.remove('selected'));
    const shuffled = chips.sort(() => Math.random() - 0.5);
    const count = Math.random() > 0.5 ? 2 : 1;
    shuffled.slice(0, count).forEach(c => c.classList.add('selected'));

    // Random format
    const fmtKeys = ['ad-commercial-15','ad-commercial-30','ad-commercial-60','trailer','music-video','short-film'];
    const pick = fmtKeys[Math.floor(Math.random() * fmtKeys.length)];
    const card = document.querySelector(`.format-card[data-format="${pick}"]`);
    if (card) {
      document.querySelectorAll('.format-card').forEach(b => b.classList.remove('active'));
      card.classList.add('active');
      selectedFormat = pick;
      loadPlan(pick);
    }
  }

  // Run auto-randomize on page load
  autoRandomizeOnLoad();

  // ── Kid mode toggle ──
  document.getElementById('kidMode').addEventListener('change', e => {
    document.getElementById('kidOptions').classList.toggle('visible', e.target.checked);
  });

  // ── Generate ──
  async function generate() {
    const btn = document.getElementById('generateBtn');
    const timerEl = document.getElementById('timer');
    const errorBanner = document.getElementById('errorBanner');
    const progressBar = document.getElementById('progressBar');

    btn.disabled = true;
    btn.classList.add('loading');
    errorBanner.classList.remove('visible');
    progressBar.classList.add('visible');
    streamingInProgress = true;

    // Timer
    let elapsed = 0;
    timerEl.classList.add('visible');
    timerEl.textContent = 'Elapsed: 0s';
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      elapsed++;
      timerEl.textContent = `Elapsed: ${elapsed}s`;
    }, 1000);

    // Mark all phases as pending
    const phases = ['concept','milestones','characters','locations','scenes','shots'];
    document.querySelectorAll('.progress-step').forEach(step => {
      step.className = 'progress-step active';
    });

    const input = {
      title: document.getElementById('title').value,
      genre: getGenreString(),
      format: selectedFormat,
      mainPlot: document.getElementById('mainPlot').value || undefined,
      tone: document.getElementById('tone').value || undefined,
      intendedEnding: document.getElementById('ending').value || undefined,
      automationLevel: 'full-auto',
      kidMode: document.getElementById('kidMode').checked,
      kidAgeRange: document.getElementById('kidMode').checked ? document.getElementById('kidAgeRange').value : undefined,
      visualStyle: document.getElementById('visualStyle').value || undefined,
    };

    // Accumulated data — each SSE event merges into this
    let streamData = { shots: {} };

    try {
      const res = await fetch('/api/generate-stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input, sessionId }),
      });

      if (!res.ok) {
        const errBody = await res.json().catch(() => ({ error: 'Generation failed' }));
        throw new Error(errBody.error || 'Generation failed');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Parse SSE lines
        const lines = buffer.split('\n');
        buffer = lines.pop() || ''; // keep incomplete line in buffer
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6);
          let event;
          try { event = JSON.parse(jsonStr); } catch { continue; }

          if (event.phase === 'error') {
            throw new Error(event.error || 'Pipeline error');
          }

          if (event.phase === 'done') {
            // All phases complete
            streamingInProgress = false;
            document.querySelectorAll('.progress-step').forEach(step => {
              step.className = 'progress-step done';
            });
            // Re-render results so approve bar updates from "Generating..." to the real button
            renderResults(streamData, true);
            // Enable approve bar now that generation is complete
            const approveBar = document.getElementById('approveBar');
            if (approveBar) {
              approveBar.querySelectorAll('button').forEach(b => b.disabled = false);
              approveBar.classList.remove('streaming-disabled');
            }
            continue;
          }

          // Mark this phase done in progress bar
          const stepEl = document.querySelector(`.progress-step[data-p="${event.phase}"]`);
          if (stepEl) stepEl.className = 'progress-step done';

          // Merge event data into accumulated streamData
          if (event.plan) streamData.plan = event.plan;
          if (event.concept) streamData.concept = event.concept;
          if (event.milestones) streamData.milestones = event.milestones;
          if (event.characters) streamData.characters = event.characters;
          if (event.locations) streamData.locations = event.locations;
          if (event.scenes) streamData.scenes = event.scenes;
          if (event.shots) streamData.shots = event.shots;

          // Progressive render — show whatever we have so far
          renderResults(streamData);
        }
      }
    } catch (err) {
      errorBanner.textContent = err.message;
      errorBanner.classList.add('visible');
    } finally {
      streamingInProgress = false;
      btn.disabled = false;
      btn.classList.remove('loading');
      clearInterval(timerInterval);
      // Re-render so approve bar shows correct state (not "Generating...")
      if (lastGeneratedData) renderResults(lastGeneratedData, true);
      // Ensure approve bar is enabled if stream ended (e.g. error path)
      const approveBar = document.getElementById('approveBar');
      if (approveBar) {
        approveBar.querySelectorAll('button').forEach(b => b.disabled = false);
        approveBar.classList.remove('streaming-disabled');
      }
    }
  }

  // ── Shared utility ──
  function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Render Results ──
  let lastGeneratedData = null;
  let streamingInProgress = false;
  const lockedResults = new Set();
  const lockedItems = new Set();

  function renderResults(data, preserveLocks) {
    lastGeneratedData = data;
    if (!preserveLocks) {
      lockedResults.clear();
      lockedItems.clear();
      ['concept','milestones','characters','locations','scenes','shots'].forEach(s => lockedResults.add(s));
    }

    document.getElementById('timelineView').classList.remove('visible');
    document.getElementById('resultContent').style.display = '';

    const el = document.getElementById('resultContent');
    let html = '';

    function sh(emoji, title, key, count) {
      return `<div class="result-header">
        <span class="emoji">${emoji}</span>
        <h3>${title}</h3>
        ${count != null ? '<span class="count">' + count + '</span>' : ''}
        <div class="result-actions" onclick="event.stopPropagation()">
          <button class="result-ai-btn" onclick="startResultAi('${key}')" title="AI regenerate">✨ AI</button>
          <button class="result-lock-btn locked" onclick="toggleResultLock('${key}', this)">🔒</button>
        </div>
        <span class="chevron">▼</span>
      </div>`;
    }

    function itemBar(type, idx, total) {
      const key = type + '-' + idx;
      const isLocked = lockedItems.has(key);
      const showDel = type !== 'concept';
      return '<div class="item-toolbar">'
        + '<button class="it-lock ' + (isLocked ? 'locked' : '') + '" onclick="event.stopPropagation();toggleItemLock(\'' + type + '\',' + idx + ',this)" title="' + (isLocked ? 'Unlock' : 'Lock') + '">' + (isLocked ? '🔒' : '🔓') + '</button>'
        + '<button onclick="event.stopPropagation();startItemAi(\'' + type + '\',' + idx + ')" title="AI regenerate">✨</button>'
        + '<button onclick="event.stopPropagation();toggleItemEdit(\'' + type + '\',' + idx + ')" title="Edit">✏️</button>'
        + (idx > 0 ? '<button onclick="event.stopPropagation();moveItem(\'' + type + '\',' + idx + ',-1)" title="Move up">↑</button>' : '')
        + (idx < total - 1 ? '<button onclick="event.stopPropagation();moveItem(\'' + type + '\',' + idx + ',1)" title="Move down">↓</button>' : '')

  // ── Lock state ──
  const lockedFields = new Set();

  function toggleLock(fieldName) {
    const fieldEl = document.getElementById('field-' + fieldName);
    const lockBtn = fieldEl?.querySelector('.lock-toggle');
    if (!fieldEl || !lockBtn) return;

    if (lockedFields.has(fieldName)) {
      lockedFields.delete(fieldName);
      lockBtn.classList.remove('locked');
      lockBtn.textContent = '🔓';
      lockBtn.title = 'Lock ' + fieldName;
      fieldEl.classList.remove('locked');
    } else {
      lockedFields.add(fieldName);
      lockBtn.classList.add('locked');
      lockBtn.textContent = '🔒';
      lockBtn.title = 'Unlock ' + fieldName;
      fieldEl.classList.add('locked');
    }
  }

  // ── AI prompt bar ──
  let aiTargetField = null;

  const fieldLabels = {
    all: 'All Fields', title: 'Title', genre: 'Genre', format: 'Format',
    mainPlot: 'Plot', tone: 'Tone', intendedEnding: 'Ending', visualStyle: 'Style'
  };

  function startAiGenerate(field) {
    // If the field is locked, don't allow AI generation
    if (field !== 'all' && lockedFields.has(field)) return;

    aiTargetField = field;
    const bar = document.getElementById('aiPromptBar');
    const label = document.getElementById('aiPromptLabel');
    const input = document.getElementById('aiDirection');
    label.textContent = '✨ ' + (fieldLabels[field] || field);
    input.value = '';
    input.placeholder = field === 'all'
      ? 'Optional: overall direction, e.g. "dark sci-fi"...'
      : `Optional: direction for ${fieldLabels[field] || field}...`;
    bar.classList.add('visible');
    input.focus();
  }

  function cancelAiPrompt() {
    document.getElementById('aiPromptBar').classList.remove('visible');
    aiTargetField = null;
  }

  async function executeAiGenerate() {
    if (!aiTargetField) return;
    const field = aiTargetField;
    const direction = document.getElementById('aiDirection').value.trim();
    cancelAiPrompt();

    // Determine which fields to generate
    const allFields = ['title', 'genre', 'format', 'mainPlot', 'tone', 'intendedEnding', 'visualStyle'];
    let fieldsToGen;
    if (field === 'all') {
      fieldsToGen = allFields.filter(f => !lockedFields.has(f));
    } else {
      fieldsToGen = [field];
    }

    if (fieldsToGen.length === 0) return;

    // Show loading state
    const isAll = field === 'all';
    const allBtn = document.getElementById('randomizeAllBtn');
    let fieldAiBtn = null;

    if (isAll) {
      allBtn.disabled = true;
      allBtn.classList.add('loading');
    } else {
      const fieldEl = document.getElementById('field-' + field);
      fieldAiBtn = fieldEl?.querySelector('.ai-btn');
      if (fieldAiBtn) fieldAiBtn.classList.add('loading');
    }

    try {
      const res = await fetch('/api/randomize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fields: fieldsToGen,
          context: getContext(),
          direction: direction || undefined,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      applyValues(data);
    } catch (err) {
      console.error('AI generate failed:', err);
    } finally {
      if (isAll) {
        allBtn.disabled = false;
        allBtn.classList.remove('loading');
      }
      if (fieldAiBtn) fieldAiBtn.classList.remove('loading');
    }
  }

  // ── Field helpers ──

  // Human-readable labels for format keys
  const FORMAT_LABELS = {
    'ad-commercial-15': '15-second advertisement/commercial',
    'ad-commercial-30': '30-second advertisement/commercial',
    'ad-commercial-60': '60-second advertisement/commercial',
    'trailer':          'movie trailer (1-2 minutes)',
    'music-video':      'music video (3-4 minutes)',
    'short-film':       'short film (5-15 minutes)',
  };

  function getContext() {
    const fmt = selectedFormat;
    // Send both the raw key and a human-readable description so the AI fully understands the constraint
    const formatLabel = FORMAT_LABELS[fmt] || fmt;
    return {
      title: document.getElementById('title').value,
      genre: getGenreString(),
      format: fmt,
      formatDescription: fmt ? formatLabel : '',
      mainPlot: document.getElementById('mainPlot').value,
      tone: document.getElementById('tone').value,
      intendedEnding: document.getElementById('ending').value,
      visualStyle: document.getElementById('visualStyle').value,
    };
  }

  const FORMAT_KEYS = ['ad-commercial-15','ad-commercial-30','ad-commercial-60','trailer','music-video','short-film'];

  function applyValues(data) {
    if (data.title != null) document.getElementById('title').value = data.title;
    if (data.genre != null) {
      // Support comma-separated genre strings from AI
      const genres = String(data.genre).toLowerCase().split(/[,\/&+]+/).map(g => g.trim());
      const chips = document.querySelectorAll('.genre-chip');
      chips.forEach(c => c.classList.remove('selected'));
      genres.forEach(g => {
        const chip = [...chips].find(c => c.dataset.genre === g);
        if (chip) chip.classList.add('selected');
      });
      // Ensure at least one is selected
      if (!document.querySelector('.genre-chip.selected') && chips.length) chips[0].classList.add('selected');
    }
    if (data.format != null) {
      // AI returned a format — find the matching card
      const fmt = data.format.toLowerCase().replace(/\s+/g, '-');
      const match = FORMAT_KEYS.find(k => k === fmt || fmt.includes(k) || k.includes(fmt));
      if (match) {
        const card = document.querySelector(`.format-card[data-format="${match}"]`);
        if (card) {
          document.querySelectorAll('.format-card').forEach(b => b.classList.remove('active'));
          card.classList.add('active');
          selectedFormat = match;
          loadPlan(match);
        }
      }
    }
    if (data.mainPlot != null) document.getElementById('mainPlot').value = data.mainPlot;
    if (data.tone != null) document.getElementById('tone').value = data.tone;
    if (data.intendedEnding != null) document.getElementById('ending').value = data.intendedEnding;
    if (data.visualStyle != null) document.getElementById('visualStyle').value = data.visualStyle;
  }

  // ── Result lock/AI/approve/timeline ──
  let resultAiTarget = null;

  function toggleResultLock(section, btn) {
    if (lockedResults.has(section)) {
      lockedResults.delete(section);
      btn.classList.remove('locked');
      btn.textContent = '🔓';
      btn.title = 'Lock ' + section;
      const el = document.querySelector('.result-section[data-section="' + section + '"]');
      if (el) el.classList.add('unlocked');
    } else {
      lockedResults.add(section);
      btn.classList.add('locked');
      btn.textContent = '🔒';
      btn.title = 'Unlock ' + section;
      const el = document.querySelector('.result-section[data-section="' + section + '"]');
      if (el) el.classList.remove('unlocked');
    }
  }

  function startResultAi(section) {
    if (lockedResults.has(section)) {
      alert('Unlock this section first to regenerate it.');
      return;
    }
    resultAiTarget = section;
    const bar = document.getElementById('resultAiBar');
    const label = document.getElementById('resultAiLabel');
    const input = document.getElementById('resultAiDirection');
    const names = { concept:'Concept', milestones:'Milestones', characters:'Characters',
      locations:'Locations', scenes:'Scenes', shots:'Shots' };
    label.textContent = '✨ ' + (names[section] || section);
    input.value = '';
    bar.classList.add('visible');
    input.focus();
  }

  function cancelResultAi() {
    document.getElementById('resultAiBar').classList.remove('visible');
    resultAiTarget = null;
  }

  async function executeResultAi() {
    if (!resultAiTarget || !lastGeneratedData) return;
    const target = resultAiTarget;
    const direction = document.getElementById('resultAiDirection').value.trim();
    cancelResultAi();

    // Check if item-level target (e.g., 'milestone:0')
    const isItem = target.includes(':');

    if (isItem) {
      const [type, idxStr] = target.split(':');
      const idx = parseInt(idxStr);
      const card = document.querySelector('.item-card[data-type="' + type + '"][data-idx="' + idx + '"]');
      if (card) card.style.opacity = '0.5';

      try {
        const res = await fetch('/api/regenerate-item', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, index: idx, currentData: lastGeneratedData, direction: direction || undefined }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        const d = lastGeneratedData;
        const baseType = type.startsWith('shot-') ? 'shot' : type;
        if (baseType === 'concept') d.concept = data;
        else if (baseType === 'milestone' && d.milestones?.milestones) d.milestones.milestones[idx] = data;
        else if (baseType === 'character' && d.characters?.characters) d.characters.characters[idx] = data;
        else if (baseType === 'location' && d.locations?.locations) d.locations.locations[idx] = data;
        else if (baseType === 'scene' && d.scenes) d.scenes[idx] = data;
        else if (baseType === 'shot') {
          const si = parseInt(type.split('-')[1]);
          const g = d.shots[si] || d.shots[String(si)];
          if (g?.shots) g.shots[idx] = data;
        }
        renderResults(d, true);
      } catch (err) {
        console.error('Item regeneration failed:', err);
        alert('Regeneration failed: ' + err.message);
      } finally {
        if (card) card.style.opacity = '';
      }
    } else {
      // Section-level regeneration
      const section = target;
      const sectionEl = document.querySelector('.result-section[data-section="' + section + '"]');
      const aiBtn = sectionEl?.querySelector('.result-ai-btn');
      if (aiBtn) aiBtn.textContent = '⏳';

      try {
        const input = getContext();
        input.format = selectedFormat;
        const res = await fetch('/api/regenerate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            phase: section,
            input,
            currentData: lastGeneratedData,
            direction: direction || undefined,
            sessionId,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        Object.assign(lastGeneratedData, data);
        renderResults(lastGeneratedData, true);
        lockedResults.delete(section);
        const newBtn = document.querySelector('.result-section[data-section="' + section + '"] .result-lock-btn');
        if (newBtn) {
          newBtn.classList.remove('locked');
          newBtn.textContent = '🔓';
          const newEl = document.querySelector('.result-section[data-section="' + section + '"]');
          if (newEl) newEl.classList.add('unlocked');
        }
      } catch (err) {
        console.error('Regeneration failed:', err);
        alert('Regeneration failed: ' + err.message);
      } finally {
        if (aiBtn) aiBtn.textContent = '✨ AI';
      }
    }
  }

  async function regenerateUnlocked() {
    const unlocked = ['concept','milestones','characters','locations','scenes'].filter(s => !lockedResults.has(s));
    if (unlocked.length === 0) {
      alert('All sections are locked. Unlock sections you want to regenerate.');
      return;
    }
    for (const section of unlocked) {
      resultAiTarget = section;
      document.getElementById('resultAiDirection').value = '';
      await executeResultAi();
    }
  }

  // ── Pre-Production state ──
  let preProductionData = null; // { continuityPlan, wardrobePlan, assetApprovals, sceneSignoffs, audioDesign }
  const ppLockedItems = new Set(); // tracks locked pre-production items e.g. "char-0", "loc-1", "outfit-Alex-2", "audio-theme-0"

  function ppItemBar(type, idx) {
    const key = type + '-' + idx;
    const isLocked = ppLockedItems.has(key);
    const supportsUpload = type === 'char' || type === 'loc';
    return '<div class="pp-item-toolbar">'
      + '<button class="pp-lock-btn ' + (isLocked ? 'locked' : '') + '" onclick="event.stopPropagation();togglePPLock(\'' + type + '\',' + idx + ',this)" title="' + (isLocked ? 'Unlock' : 'Lock') + '">' + (isLocked ? '🔒' : '🔓') + '</button>'
      + '<button onclick="event.stopPropagation();ppAiRegen(\'' + type + '\',' + idx + ')" title="AI regenerate">✨</button>'
      + '<button onclick="event.stopPropagation();togglePPEdit(\'' + type + '\',' + idx + ')" title="Edit">✏️</button>'
      + (supportsUpload ? '<button class="pp-upload-ref-btn" onclick="event.stopPropagation();triggerPPUpload(\'' + type + '\',' + idx + ')" title="Upload reference image">📷</button>' : '')

    if (ppLockedItems.has(key)) {
      ppLockedItems.delete(key);

    } else {
      ppLockedItems.add(key);
